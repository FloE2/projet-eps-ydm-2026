<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Suivi élève — EPS</title>
  <link rel="stylesheet" href="../assets/style.css">
  <style>
    .eleve-search-wrap{display:flex;gap:.7rem;margin-bottom:1.5rem;}
    .eleve-search-wrap input{flex:1;}
    .resultats-recherche{position:absolute;background:var(--white);border:2px solid var(--blue-lt);border-radius:8px;box-shadow:var(--shadow);z-index:10;width:calc(100% - 2rem);max-height:280px;overflow-y:auto;}
    .resultat-item{padding:.7rem 1rem;cursor:pointer;border-bottom:1px solid var(--gray-1);font-size:.9rem;}
    .resultat-item:hover{background:var(--gray-1);}
    .suivi-header{background:linear-gradient(135deg,var(--navy),#1e4d8c);color:#fff;border-radius:var(--radius);padding:1.5rem 2rem;margin-bottom:1.5rem;display:flex;align-items:center;gap:1.5rem;flex-wrap:wrap;}
    .suivi-avatar{width:72px;height:72px;background:rgba(255,255,255,.15);border-radius:50%;display:flex;align-items:center;justify-content:center;font-family:var(--font-h);font-size:1.5rem;font-weight:700;flex-shrink:0;}
    .suivi-info h2{color:#fff;margin-bottom:.3rem;font-size:1.5rem;}
    .suivi-info p{color:rgba(255,255,255,.65);font-size:.9rem;}
    /* timeline */
    .niveau-section{border-left:4px solid var(--orange);padding-left:1.5rem;margin-bottom:2rem;position:relative;}
    .niveau-section::before{content:attr(data-niveau);position:absolute;left:-32px;top:0;background:var(--orange);color:#fff;font-family:var(--font-h);font-size:.8rem;font-weight:700;padding:.2rem .5rem;border-radius:4px;writing-mode:vertical-rl;text-orientation:mixed;transform:rotate(180deg);}
    .niveau-section.niv-6e{border-left-color:#3B82F6;} .niveau-section.niv-6e::before{background:#3B82F6;}
    .niveau-section.niv-5e{border-left-color:var(--green);} .niveau-section.niv-5e::before{background:var(--green);}
    .niveau-section.niv-4e{border-left-color:var(--yellow);} .niveau-section.niv-4e::before{background:var(--yellow);color:var(--navy);}
    .niveau-section.niv-3e{border-left-color:var(--purple);} .niveau-section.niv-3e::before{background:var(--purple);}
    /* card apsa */
    .apsa-eval-card{background:#fff;border-radius:var(--radius);margin-bottom:1.2rem;box-shadow:0 2px 10px rgba(0,0,0,.07);overflow:hidden;}
    .apsa-card-header{background:var(--navy);color:#fff;padding:.9rem 1.2rem;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:.5rem;}
    .apsa-nom{font-family:var(--font-h);font-size:1.1rem;font-weight:600;}
    .apsa-date{font-size:.78rem;opacity:.7;margin-top:.15rem;}
    /* tableau éval style PDF */
    .eval-table-wrap{overflow-x:auto;}
    .eval-table{width:100%;border-collapse:collapse;min-width:640px;}
    /* Header colonnes */
    .th-objectif{background:#2c3e6b;color:#fff;font-family:var(--font-h);font-size:.75rem;font-weight:700;text-transform:uppercase;letter-spacing:.05em;padding:.65rem 1rem;width:22%;text-align:left;border-right:1px solid rgba(255,255,255,.12);}
    .th-col{padding:0;vertical-align:top;border-right:1px solid #e5e7eb;}
    .th-col:last-child{border-right:none;}
    .th-col-inner{padding:.55rem .5rem .3rem;font-family:var(--font-h);font-size:.72rem;font-weight:700;text-transform:uppercase;letter-spacing:.04em;text-align:center;}
    .th-NA{background:#fee2e2;color:#b91c1c;} .th-ECA{background:#fef3c7;color:#92400e;} .th-A{background:#dcfce7;color:#15803d;} .th-D{background:#ede9fe;color:#6d28d9;}
    .th-scale{display:flex;align-items:center;justify-content:space-between;padding:.18rem .6rem .45rem;font-size:.62rem;font-weight:700;border-top:1px solid rgba(0,0,0,.06);}
    .scale-NA{background:#fee2e2;color:#ef4444;} .scale-ECA{background:#fef3c7;color:#d97706;} .scale-A{background:#dcfce7;color:#22c55e;} .scale-D{background:#ede9fe;color:#8b5cf6;}
    /* Lignes tableau */
    .eval-table tbody tr{border-bottom:1px solid #e5e7eb;}
    .eval-table tbody tr:last-child{border-bottom:none;}
    .td-objectif{padding:.8rem 1rem;vertical-align:middle;font-size:.8rem;font-weight:600;color:#1e293b;border-right:1px solid #e5e7eb;background:#f8fafc;line-height:1.4;border-left:4px solid transparent;}
    .td-obj-num{display:inline-flex;align-items:center;justify-content:center;width:19px;height:19px;background:var(--navy);color:#fff;border-radius:50%;font-size:.62rem;font-weight:700;margin-right:.4rem;vertical-align:middle;}
    /* Cellule niveau — partie élève + partie prof */
    .td-niveau{padding:0;vertical-align:top;border-right:1px solid #e5e7eb;position:relative;}
    .td-niveau:last-child{border-right:none;}
    .cell-eleve{padding:.55rem .65rem;font-size:.72rem;line-height:1.45;color:#374151;border-bottom:2px dashed #e5e7eb;}
    .cell-prof{padding:.45rem .65rem;background:#f0f4ff;cursor:pointer;font-size:.72rem;transition:all .12s;}
    .cell-prof:hover{filter:brightness(.95);}
    /* Couleurs fond colonnes */
    .td-NA  .cell-eleve{background:#fef9f9;} .td-NA  .cell-prof{background:#fff1f1;}
    .td-ECA .cell-eleve{background:#fffdf0;} .td-ECA .cell-prof{background:#fffaea;}
    .td-A   .cell-eleve{background:#f7fef9;} .td-A   .cell-prof{background:#edfff3;}
    .td-D   .cell-eleve{background:#faf7ff;} .td-D   .cell-prof{background:#f5f0ff;}
    /* Sélection élève */
    .eleve-sel .cell-eleve{font-weight:700;}
    .td-NA.eleve-sel  .cell-eleve{background:#fee2e2;color:#991b1b;}
    .td-ECA.eleve-sel .cell-eleve{background:#fef3c7;color:#78350f;}
    .td-A.eleve-sel   .cell-eleve{background:#dcfce7;color:#14532d;}
    .td-D.eleve-sel   .cell-eleve{background:#ede9fe;color:#4c1d95;}
    /* Sélection prof */
    .prof-sel .cell-prof{font-weight:700;}
    .td-NA.prof-sel  .cell-prof{background:#fca5a5;color:#7f1d1d;}
    .td-ECA.prof-sel .cell-prof{background:#fcd34d;color:#78350f;}
    .td-A.prof-sel   .cell-prof{background:#86efac;color:#14532d;}
    .td-D.prof-sel   .cell-prof{background:#c4b5fd;color:#3b0764;}
    .cell-label{font-size:.6rem;font-weight:700;text-transform:uppercase;letter-spacing:.04em;opacity:.55;margin-bottom:.2rem;}
    .cell-desc-empty{color:#c0c8d4;font-style:italic;}
    /* Badge check */
    .check-mark{float:right;font-weight:900;font-size:.7rem;}
    /* Bordure gauche colorée selon sélection élève */
    .row-sel-NA  .td-objectif{border-left-color:#ef4444;}
    .row-sel-ECA .td-objectif{border-left-color:#f59e0b;}
    .row-sel-A   .td-objectif{border-left-color:#22c55e;}
    .row-sel-D   .td-objectif{border-left-color:#8b5cf6;}
    /* Légende */
    .legende-2col{display:flex;gap:1.5rem;padding:.55rem 1rem;background:#f8fafc;border-bottom:1px solid #e5e7eb;font-size:.71rem;flex-wrap:wrap;}
    .leg-item{display:flex;align-items:center;gap:.4rem;font-weight:600;}
    /* Bouton save par APSA */
    .save-apsa-btn{display:block;width:calc(100% - 2.4rem);margin:0 1.2rem 1.2rem;padding:.5rem;font-size:.82rem;}
    /* Commentaire */
    .commentaire-prof{padding:.6rem 1.2rem .4rem;background:#fefce8;border-top:1px solid #fef08a;}
    .commentaire-prof label{font-size:.72rem;font-weight:700;color:#854d0e;display:block;margin-bottom:.3rem;}
    .commentaire-prof textarea{width:100%;box-sizing:border-box;min-height:50px;font-size:.8rem;resize:vertical;border:1px solid #fde68a;border-radius:5px;padding:.4rem .6rem;background:#fffde7;}
    /* Récap */
    .recap-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:1rem;margin-bottom:1.5rem;}
    .recap-item{text-align:center;background:#fff;border-radius:var(--radius);padding:1.2rem;box-shadow:var(--shadow);}
    .recap-val{font-family:var(--font-h);font-size:2.4rem;font-weight:700;line-height:1;margin-bottom:.3rem;}
    .recap-label{font-size:.78rem;color:var(--gray-3);}
    .recap-bar{height:7px;border-radius:4px;margin-top:.5rem;}
    .scroll-hint{display:none;font-size:.7rem;color:#94a3b8;text-align:center;padding:.3rem;background:#f8fafc;}
    @media(max-width:700px){.scroll-hint{display:block;}}
  </style>
</head>
<body>
<nav class="topbar">
  <a href="dashboard.html" class="topbar-logo">← Dashboard</a>
  <span class="topbar-title">Suivi individuel élève</span>
  <div class="topbar-nav">
    <a href="gestion-classes.html">Classes</a>
    <a href="gestion-apsa.html">APSA</a>
    <a href="bilan-classe.html">Bilans</a>
  </div>
</nav>
<div class="container">
  <div class="card" style="position:relative;">
    <h2 style="margin-bottom:1rem;">🔍 Rechercher un élève</h2>
    <div class="eleve-search-wrap">
      <input type="text" id="search-input" placeholder="Tapez le nom ou prénom de l'élève..." oninput="rechercherEleve()" autocomplete="off">
      <button class="btn btn-ghost" onclick="clearSearch()">✕ Effacer</button>
    </div>
    <div class="resultats-recherche hidden" id="resultats-recherche"></div>
  </div>
  <div id="suivi-content" class="hidden"></div>
</div>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
<script src="../firebase-config.js"></script>
<script>
  requireProf();
  let tousEleves=[], apsaCache={}, cycleCache={}, correctionsEnCours={};
  const NIVEAUX = {
    NA:  {label:'Non Atteint',          scale:'0 — 2',  icon:'✕', couleur:'#ef4444'},
    ECA: {label:'Partiellement Atteint',scale:'3 — 5',  icon:'⊙', couleur:'#f59e0b'},
    A:   {label:'Atteint',              scale:'6 — 8',  icon:'✓', couleur:'#22c55e'},
    D:   {label:'Dépassé',              scale:'9 — 10', icon:'★', couleur:'#8b5cf6'}
  };
  async function init() {
    tousEleves = await getTousEleves();
    const params = new URLSearchParams(window.location.search);
    const eleveId = params.get('eleveId');
    if (eleveId) { const e = tousEleves.find(x=>x.id===eleveId); if(e) afficherSuivi(e); }
  }
  function rechercherEleve() {
    const q = document.getElementById('search-input').value.toLowerCase();
    const res = document.getElementById('resultats-recherche');
    if (!q||q.length<2){res.classList.add('hidden');return;}
    const filtres = tousEleves.filter(e=>(e.nom+' '+e.prenom).toLowerCase().includes(q)||(e.prenom+' '+e.nom).toLowerCase().includes(q)).slice(0,10);
    if(!filtres.length){res.innerHTML='<div class="resultat-item text-muted">Aucun résultat</div>';}
    else{res.innerHTML=filtres.map(e=>`<div class="resultat-item" onclick="selectionnerEleve('${e.id}')"><strong>${e.prenom} ${e.nom.toUpperCase()}</strong><span class="text-muted"> — ${e.classe||''} ${e.niveau||''}</span></div>`).join('');}
    res.classList.remove('hidden');
  }
  function selectionnerEleve(id) {
    const e=tousEleves.find(x=>x.id===id);
    if(!e)return;
    document.getElementById('search-input').value=`${e.prenom} ${e.nom}`;
    document.getElementById('resultats-recherche').classList.add('hidden');
    afficherSuivi(e);
  }
  function clearSearch(){document.getElementById('search-input').value='';document.getElementById('resultats-recherche').classList.add('hidden');document.getElementById('suivi-content').classList.add('hidden');}
  async function afficherSuivi(eleve) {
    const el=document.getElementById('suivi-content');
    el.classList.remove('hidden');
    el.innerHTML=`<div class="loader-wrap"><div class="spinner"></div><span>Chargement...</span></div>`;
    const evals=(await getHistoriqueEleve(eleve.id)).reverse();
    correctionsEnCours={};
    const cycleIds=[...new Set(evals.map(e=>e.cycleId))];
    const apsaIds=[...new Set(evals.map(e=>e.apsaId))];
    await Promise.all([
      ...cycleIds.map(async id=>{if(!cycleCache[id]){const d=await dbGet('cycles/'+id);if(d)cycleCache[id]={id,...d};}}),
      ...apsaIds.map(async id=>{if(!apsaCache[id]){const d=await dbGet('apsa/'+id);if(d)apsaCache[id]={id,...d};}})
    ]);
    const parNiveau={'6e':[],'5e':[],'4e':[],'3e':[]};
    evals.forEach(ev=>{const cy=cycleCache[ev.cycleId];const niv=ev.niveau||cy?.niveau||eleve.niveau||'6e';if(parNiveau[niv])parNiveau[niv].push(ev);});
    let totalObj=0,totalA=0,totalD=0,totalECA=0;
    evals.forEach(ev=>{Object.entries(ev.resultats||{}).forEach(([k,v])=>{if(!k.startsWith('obj_'))return;totalObj++;if(v==='A')totalA++;if(v==='D')totalD++;if(v==='ECA')totalECA++;});});
    const pct=totalObj>0?Math.round((totalA+totalD)/totalObj*100):0;
    const ini=(eleve.prenom?.[0]||'')+(eleve.nom?.[0]||'');
    let html=`
      <div class="suivi-header">
        <div class="suivi-avatar">${ini.toUpperCase()}</div>
        <div class="suivi-info">
          <h2>${eleve.prenom} ${(eleve.nom||'').toUpperCase()}</h2>
          <p>${eleve.classe||'—'} · ${eleve.niveau||'—'} · ${window.ANNEE_SCOLAIRE}</p>
          <p style="margin-top:.3rem;">${evals.length} auto-évaluation${evals.length>1?'s':''} enregistrée${evals.length>1?'s':''}</p>
        </div>
      </div>
      <div class="recap-grid">
        <div class="recap-item"><div class="recap-val" style="color:var(--green)">${pct}%</div><div class="recap-label">Acquis ou Dépassé</div><div class="recap-bar" style="background:var(--gray-1)"><div style="width:${pct}%;height:100%;background:var(--green);border-radius:4px"></div></div></div>
        <div class="recap-item"><div class="recap-val" style="color:var(--blue-lt)">${totalObj}</div><div class="recap-label">Objectifs évalués</div></div>
        <div class="recap-item"><div class="recap-val" style="color:var(--purple)">${totalD}</div><div class="recap-label">Dépassé ★</div></div>
        <div class="recap-item"><div class="recap-val" style="color:var(--yellow)">${totalECA}</div><div class="recap-label">En cours</div></div>
      </div>`;
    const ordreNiv=['6e','5e','4e','3e'];
    let hasSomething=false;
    ordreNiv.forEach(niv=>{
      const evalsNiv=parNiveau[niv];
      if(!evalsNiv.length)return;
      hasSomething=true;
      const niveauKeys=niv==='6e'?['NA','ECA','A']:['NA','ECA','A','D'];
      html+=`<div class="niveau-section niv-${niv}" data-niveau="${niv}">`;
      html+=`<h2 style="margin-bottom:1rem;font-size:1.05rem;color:var(--gray-4)">Année de ${niv}</h2>`;
      evalsNiv.forEach(ev=>{
        const apsaData=apsaCache[ev.apsaId]||{};
        const dateStr=ev.dateModif?new Date(ev.dateModif).toLocaleDateString('fr-FR'):'—';
        const objKeys=Object.entries(ev.resultats||{}).filter(([k])=>k.startsWith('obj_'));
        const nbA=objKeys.filter(([,v])=>v==='A'||v==='D').length;
        const corr=ev.resultats_prof||{};
        correctionsEnCours[ev.id]={...corr};
        // Regrouper objectifs par domaine
        const parDomaine={};
        (apsaData.objectifs||[]).forEach(obj=>{const d=obj.domaine||'Général';if(!parDomaine[d])parDomaine[d]=[];parDomaine[d].push(obj);});
        html+=`
          <div class="apsa-eval-card" id="card-${ev.id}">
            <div class="apsa-card-header">
              <div>
                <div class="apsa-nom">${apsaData.nom||ev.apsaId}</div>
                <div class="apsa-date">📅 ${dateStr}</div>
              </div>
              <span class="badge-niveau badge-A">${nbA}/${objKeys.length} Acquis (élève)</span>
            </div>
            <div class="legende-2col">
              <div class="leg-item"><span style="display:inline-block;width:10px;height:10px;border-radius:2px;background:#bee7fb;border:1px solid #7dd3fc"></span> Auto-évaluation élève</div>
              <div class="leg-item"><span style="display:inline-block;width:10px;height:10px;border-radius:2px;background:#c7d7fd;border:1px solid #93a8f8"></span> ✏️ Correction professeur (cliquable)</div>
            </div>`;
        // Tableau par domaine
        Object.entries(parDomaine).forEach(([domaine, objectifsDom])=>{
          const domLabel=window.DOMAINES_SOCLE[domaine]||domaine;
          html+=`
            <div style="padding:.5rem 1.2rem .2rem;background:#f8fafc;border-bottom:1px solid #e5e7eb;">
              <span style="font-size:.72rem;font-weight:700;color:var(--navy)">${domaine}</span>
              <span style="font-size:.72rem;color:#64748b;margin-left:.5rem">${domLabel}</span>
            </div>
            <div class="scroll-hint">← Faire défiler →</div>
            <div class="eval-table-wrap">
              <table class="eval-table">
                <thead><tr>
                  <th class="th-objectif">Objectif</th>
                  ${niveauKeys.map(code=>`
                    <th class="th-col">
                      <div class="th-col-inner th-${code}">${NIVEAUX[code].icon} ${code==='NA'?'Non Atteint':code==='ECA'?'Part. Atteint':code==='A'?'Atteint':'Dépassé'}</div>
                      <div class="th-scale scale-${code}"><span>${NIVEAUX[code].scale.split('—')[0].trim()}</span><span style="opacity:.35">—</span><span>${NIVEAUX[code].scale.split('—')[1].trim()}</span></div>
                    </th>`).join('')}
                </tr></thead>
                <tbody>
                  ${objectifsDom.map((obj,i)=>{
                    const num=obj.id||(i+1);
                    const key=`obj_${num}`;
                    const codeEleve=ev.resultats?.[key]||'';
                    const codeProf=corr[key]||'';
                    const d=obj.descripteurs||{};
                    return `
                      <tr class="${codeEleve?'row-sel-'+codeEleve:''}">
                        <td class="td-objectif"><span class="td-obj-num">${num}</span>${obj.texte}</td>
                        ${niveauKeys.map(c=>`
                          <td class="td-niveau td-${c}${codeEleve===c?' eleve-sel':''}${codeProf===c?' prof-sel':''}" id="tdp-${ev.id}-${num}-${c}">
                            <div class="cell-eleve">
                              <div class="cell-label">👤 Élève</div>
                              ${codeEleve===c?`<span class="check-mark" style="color:${NIVEAUX[c].couleur}">✓</span>`:''}
                              <div class="${d[c]?'':'cell-desc-empty'}">${d[c]||'—'}</div>
                            </div>
                            <div class="cell-prof" onclick="setCorrection('${ev.id}','${num}','${c}')">
                              <div class="cell-label">✏️ Prof</div>
                              ${codeProf===c?`<span class="check-mark" style="color:${NIVEAUX[c].couleur}">✓</span>`:''}
                              <div style="font-size:.7rem;${codeProf===c?'font-weight:700':'color:#94a3b8;font-style:italic'}">${codeProf===c?NIVEAUX[c].label:'Cliquer pour corriger'}</div>
                            </div>
                          </td>`).join('')}
                      </tr>`;
                  }).join('')}
                </tbody>
              </table>
            </div>`;
        });
        // Commentaire élève
        const commentairesEleve=Object.entries(ev.resultats||{}).filter(([k])=>k.startsWith('commentaire_'));
        if(commentairesEleve.length){
          html+=`<div class="commentaire-prof" style="background:#fefce8;border-top:1px solid #fef08a;">
            <label>💬 Commentaires élève</label>
            ${commentairesEleve.map(([k,v])=>`<div style="font-size:.8rem;padding:.3rem 0;color:#78350f">${v}</div>`).join('')}
          </div>`;
        }
        // Commentaire prof
        const commProf=corr['commentaire_prof']||'';
        html+=`
          <div class="commentaire-prof">
            <label>✏️ Note du professeur (optionnel)</label>
            <textarea id="comm-prof-${ev.id}" placeholder="Observations, feedback pour l'élève..." oninput="marquerCorrectionModifiee('${ev.id}')">${commProf}</textarea>
          </div>
          <button class="btn btn-primary save-apsa-btn" id="save-btn-${ev.id}" onclick="sauvegarderCorrection('${ev.id}')">
            💾 Enregistrer la correction
          </button>
        </div>`;
      });
      html+=`</div>`;
    });
    if(!hasSomething){html+=`<div class="alert alert-info">ℹ️ Aucune auto-évaluation enregistrée pour cet élève.</div>`;}
    el.innerHTML=html;
  }
  function setCorrection(evalId,objNum,code){
    const key=`obj_${objNum}`;
    if(!correctionsEnCours[evalId])correctionsEnCours[evalId]={};
    const current=correctionsEnCours[evalId][key]||'';
    const newCode=current===code?'':code;
    correctionsEnCours[evalId][key]=newCode||undefined;
    if(!newCode)delete correctionsEnCours[evalId][key];
    // Rafraîchir les cellules de cet objectif
    ['NA','ECA','A','D'].forEach(c=>{
      const td=document.getElementById(`tdp-${evalId}-${objNum}-${c}`);
      if(!td)return;
      // Récupérer codeEleve depuis les classes actuelles
      const hasEleveClass=td.classList.contains('eleve-sel');
      td.className=`td-niveau td-${c}${hasEleveClass?' eleve-sel':''}${newCode===c?' prof-sel':''}`;
      // Mettre à jour partie prof
      const cellProf=td.querySelector('.cell-prof');
      if(cellProf){
        cellProf.innerHTML=`
          <div class="cell-label">✏️ Prof</div>
          ${newCode===c?`<span class="check-mark" style="color:${NIVEAUX[c].couleur}">✓</span>`:''}
          <div style="font-size:.7rem;${newCode===c?'font-weight:700':'color:#94a3b8;font-style:italic'}">${newCode===c?NIVEAUX[c].label:'Cliquer pour corriger'}</div>`;
      }
    });
    marquerCorrectionModifiee(evalId);
  }
  function marquerCorrectionModifiee(evalId){
    const btn=document.getElementById(`save-btn-${evalId}`);
    if(btn){btn.style.background='var(--orange)';btn.textContent='💾 Enregistrer la correction ●';}
  }
  async function sauvegarderCorrection(evalId){
    const btn=document.getElementById(`save-btn-${evalId}`);
    btn.disabled=true;btn.textContent='⏳ Enregistrement...';
    try{
      const commProf=document.getElementById(`comm-prof-${evalId}`)?.value||'';
      const resultats_prof={...correctionsEnCours[evalId]||{}};
      if(commProf)resultats_prof['commentaire_prof']=commProf;
      await dbUpdate('evaluations/'+evalId,{resultats_prof,dateCorr:new Date().toISOString()});
      showToast('✓ Correction enregistrée !','success');
      btn.style.background='var(--green)';btn.textContent='✓ Correction enregistrée';
      setTimeout(()=>{btn.disabled=false;btn.style.background='';btn.textContent='💾 Enregistrer la correction';},2500);
    }catch(e){showToast('❌ '+e.message,'error');btn.disabled=false;btn.textContent='💾 Enregistrer la correction';}
  }
  function showToast(msg,type='success'){const t=document.createElement('div');t.className=`toast ${type}`;t.textContent=msg;document.body.appendChild(t);setTimeout(()=>t.remove(),3000);}
  document.addEventListener('click',e=>{if(!e.target.closest('.card'))document.getElementById('resultats-recherche').classList.add('hidden');});
  init();
</script>
</body>
</html>
