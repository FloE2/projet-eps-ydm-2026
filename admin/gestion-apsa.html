<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gestion des APSA — EPS</title>
  <link rel="stylesheet" href="../assets/style.css">
  <style>
    .apsa-card {
      background: var(--white);
      border: 2px solid var(--gray-1);
      border-radius: var(--radius);
      padding: 1.2rem 1.5rem;
      margin-bottom: 1rem;
      transition: all .2s;
    }
    .apsa-card:hover { border-color: var(--blue-lt); }
    .apsa-card-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: .5rem;
    }
    .apsa-titre {
      font-family: var(--font-h);
      font-size: 1.15rem;
      font-weight: 600;
    }
    .apsa-tags { display: flex; gap: .4rem; flex-wrap: wrap; align-items: center; }
    .apsa-tag {
      background: var(--gray-1);
      color: var(--gray-4);
      font-size: .75rem;
      padding: .15rem .6rem;
      border-radius: 12px;
      font-weight: 600;
    }
    .apsa-tag.ca { background: rgba(37,99,235,.1); color: var(--blue-lt); }
    .apsa-tag.niv { background: rgba(45,158,104,.1); color: var(--green); }
    .apsa-objectifs {
      margin-top: .8rem;
      padding-top: .8rem;
      border-top: 1px solid var(--gray-1);
      display: none;
    }
    .apsa-objectifs.open { display: block; }
    .obj-item {
      display: flex;
      align-items: flex-start;
      gap: .8rem;
      padding: .5rem;
      border-radius: 6px;
      margin-bottom: .4rem;
      background: var(--gray-1);
      font-size: .88rem;
    }
    .obj-num {
      width: 22px; height: 22px;
      background: var(--navy);
      color: #fff;
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: .7rem;
      font-weight: 700;
      flex-shrink: 0;
    }

    /* Modal */
    .modal-bg {
      position: fixed; inset: 0;
      background: rgba(0,0,0,.5);
      z-index: 200;
      display: flex;
      align-items: flex-start;
      justify-content: center;
      padding: 2rem 1rem;
      overflow-y: auto;
    }
    .modal-bg.hidden { display: none; }
    .modal {
      background: var(--white);
      border-radius: 16px;
      padding: 2rem;
      width: 100%;
      max-width: 680px;
      box-shadow: 0 30px 80px rgba(0,0,0,.3);
      position: relative;
    }
    .modal h2 { margin-bottom: 1.5rem; }
    .modal-close {
      position: absolute;
      top: 1rem; right: 1rem;
      background: var(--gray-1);
      border: none;
      width: 32px; height: 32px;
      border-radius: 50%;
      cursor: pointer;
      font-size: 1.1rem;
      display: flex; align-items: center; justify-content: center;
    }
    .modal-close:hover { background: var(--gray-2); }

    /* Objectifs dynamiques */
    .objectif-line {
      display: grid;
      grid-template-columns: 1fr auto 36px;
      gap: .5rem;
      align-items: center;
      margin-bottom: .5rem;
    }
    .objectif-line select { width: 100%; }
    .btn-del-obj {
      width: 32px; height: 32px;
      background: var(--red);
      color: #fff;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      font-size: 1rem;
      display: flex; align-items: center; justify-content: center;
    }

    .niveaux-check { display: flex; gap: 1rem; flex-wrap: wrap; }
    .niveaux-check label { display: flex; align-items: center; gap: .4rem; font-weight: 400; cursor: pointer; }
    .niveaux-check input[type="checkbox"] { width: auto; }
  </style>
</head>
<body>

<nav class="topbar">
  <a href="dashboard.html" class="topbar-logo">← Dashboard</a>
  <span class="topbar-title">Gestion des APSA</span>
  <div class="topbar-nav">
    <a href="gestion-classes.html">Classes</a>
    <a href="gestion-apsa.html" class="active">APSA</a>
    <a href="bilan-classe.html">Bilans</a>
  </div>
</nav>

<div class="container">

  <div class="card-header" style="margin-bottom:1.5rem;">
    <h1>🏃 Activités Physiques, Sportives et Artistiques</h1>
    <button class="btn btn-orange" onclick="ouvrirModal()">+ Nouvelle APSA</button>
  </div>

  <div id="message"></div>
  <div id="liste-apsa">
    <div class="loader-wrap"><div class="spinner"></div><span>Chargement...</span></div>
  </div>
</div>

<!-- Modal création/édition APSA -->
<div class="modal-bg hidden" id="modal-bg">
  <div class="modal">
    <button class="modal-close" onclick="fermerModal()">✕</button>
    <h2 id="modal-titre">Nouvelle APSA</h2>

    <div class="form-group">
      <label>Nom de l'APSA *</label>
      <input type="text" id="f-nom" placeholder="Ex : Acrosport, Badminton, Course de durée...">
    </div>

    <div style="display:grid;grid-template-columns:1fr 1fr;gap:1rem;">
      <div class="form-group">
        <label>Champ d'apprentissage *</label>
        <select id="f-ca">
          <option value="">— Choisir —</option>
          <option value="CA1">CA1 · Performance optimale</option>
          <option value="CA2">CA2 · Environnements variés</option>
          <option value="CA3">CA3 · Expression / Acrobatie</option>
          <option value="CA4">CA4 · Affrontement</option>
        </select>
      </div>
      <div class="form-group">
        <label>Description courte</label>
        <input type="text" id="f-desc" placeholder="Ex : Sport collectif, duel...">
      </div>
    </div>

    <div class="form-group">
      <label>Niveaux concernés</label>
      <div class="niveaux-check">
        <label><input type="checkbox" class="chk-niv" value="6e" checked> 6e</label>
        <label><input type="checkbox" class="chk-niv" value="5e" checked> 5e</label>
        <label><input type="checkbox" class="chk-niv" value="4e" checked> 4e</label>
        <label><input type="checkbox" class="chk-niv" value="3e" checked> 3e</label>
      </div>
    </div>

    <hr style="border:none;border-top:2px solid var(--gray-1);margin:1.5rem 0;">

    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:1rem;">
      <h3>Objectifs à évaluer</h3>
      <button class="btn btn-ghost btn-sm" onclick="ajouterObjectif()">+ Ajouter un objectif</button>
    </div>
    <p class="text-muted text-small" style="margin-bottom:1rem;">
      Pour chaque objectif, précisez le Domaine du Socle auquel il se rattache.
    </p>
    <div id="objectifs-list"></div>

    <div style="display:flex;gap:1rem;margin-top:1.5rem;justify-content:flex-end;">
      <button class="btn btn-ghost" onclick="fermerModal()">Annuler</button>
      <button class="btn btn-orange btn-lg" onclick="sauvegarderApsa()">💾 Enregistrer l'APSA</button>
    </div>
  </div>
</div>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
<script src="../firebase-config.js"></script>
<script>
  requireProf();

  let apsaEnEdition = null; // null = création, sinon { id, ...data }

  // ── Chargement liste APSA ──────────────────────────────────
  async function chargerApsa() {
    const el = document.getElementById('liste-apsa');
    try {
      const apsa = await getToutesApsa();
      if (apsa.length === 0) {
        el.innerHTML = `<div class="alert alert-info">
          ℹ️ Aucune APSA créée. Commencez par en créer une !
          <button class="btn btn-orange btn-sm" onclick="ouvrirModal()" style="margin-left:1rem">+ Créer</button>
        </div>`;
        return;
      }
      el.innerHTML = apsa.map(a => {
        const niveaux = (a.niveaux || []).join(', ');
        const nbObj = (a.objectifs || []).length;
        return `
          <div class="apsa-card">
            <div class="apsa-card-header">
              <div>
                <div class="apsa-titre">${a.nom}</div>
                <div class="apsa-tags" style="margin-top:.4rem;">
                  <span class="apsa-tag ca">${a.champAppr || '—'}</span>
                  ${niveaux ? `<span class="apsa-tag niv">📚 ${niveaux}</span>` : ''}
                  <span class="apsa-tag">🎯 ${nbObj} objectif${nbObj>1?'s':''}</span>
                  ${a.description ? `<span class="apsa-tag">${a.description}</span>` : ''}
                </div>
              </div>
              <div style="display:flex;gap:.5rem;">
                <button class="btn btn-ghost btn-sm" onclick="toggleObjectifs('${a.id}')">👁 Voir</button>
                <button class="btn btn-outline btn-sm" onclick="editerApsa('${a.id}')">✏️ Modifier</button>
                <button class="btn btn-danger btn-sm" onclick="supprimerApsa('${a.id}','${a.nom}')">🗑</button>
              </div>
            </div>
            <div class="apsa-objectifs" id="obj-${a.id}">
              ${(a.objectifs||[]).map((obj,i) => `
                <div class="obj-item">
                  <div class="obj-num">${obj.id||i+1}</div>
                  <div>
                    <strong>[${obj.domaine||'—'}]</strong> ${obj.texte}
                  </div>
                </div>`).join('') || '<p class="text-muted text-small">Aucun objectif défini.</p>'}
            </div>
          </div>`;
      }).join('');
    } catch(e) {
      el.innerHTML = `<div class="alert alert-error">❌ ${e.message}</div>`;
    }
  }

  function toggleObjectifs(id) {
    const el = document.getElementById('obj-' + id);
    el.classList.toggle('open');
  }

  // ── Modal ──────────────────────────────────────────────────
  let objCounter = 0;

  function ouvrirModal(data = null) {
    apsaEnEdition = data;
    objCounter = 0;
    document.getElementById('modal-titre').textContent = data ? 'Modifier l\'APSA' : 'Nouvelle APSA';

    // Réinitialiser les champs
    document.getElementById('f-nom').value  = data?.nom  || '';
    document.getElementById('f-ca').value   = data?.champAppr || '';
    document.getElementById('f-desc').value = data?.description || '';

    // Niveaux
    document.querySelectorAll('.chk-niv').forEach(cb => {
      cb.checked = data ? (data.niveaux||[]).includes(cb.value) : true;
    });

    // Objectifs
    document.getElementById('objectifs-list').innerHTML = '';
    if (data?.objectifs?.length) {
      data.objectifs.forEach(obj => ajouterObjectif(obj));
    } else {
      ajouterObjectif();
    }

    document.getElementById('modal-bg').classList.remove('hidden');
    document.getElementById('f-nom').focus();
  }

  function fermerModal() {
    document.getElementById('modal-bg').classList.add('hidden');
    apsaEnEdition = null;
  }

  function ajouterObjectif(data = null) {
    objCounter++;
    const n = objCounter;
    const domainesOptions = Object.entries(window.DOMAINES_SOCLE).map(([code, label]) =>
      `<option value="${code}" ${data?.domaine===code?'selected':''}>${code} · ${label.substring(0,35)}</option>`
    ).join('');

    const div = document.createElement('div');
    div.className = 'objectif-line';
    div.id = `obj-line-${n}`;
    div.innerHTML = `
      <input type="text" placeholder="Objectif ${n} : Décrire la compétence attendue..."
        value="${data?.texte||''}" id="obj-texte-${n}">
      <select id="obj-domaine-${n}" style="min-width:160px;">
        <option value="">Domaine</option>
        ${domainesOptions}
      </select>
      <button class="btn-del-obj" onclick="supprimerLigneObj(${n})">×</button>`;
    document.getElementById('objectifs-list').appendChild(div);
  }

  function supprimerLigneObj(n) {
    document.getElementById(`obj-line-${n}`)?.remove();
  }

  async function sauvegarderApsa() {
    const nom  = document.getElementById('f-nom').value.trim();
    const ca   = document.getElementById('f-ca').value;
    const desc = document.getElementById('f-desc').value.trim();
    const msg  = document.getElementById('message');

    if (!nom || !ca) {
      showToast('⚠️ Remplissez le nom et le champ d\'apprentissage', 'error');
      return;
    }

    // Niveaux cochés
    const niveaux = [...document.querySelectorAll('.chk-niv:checked')].map(cb => cb.value);

    // Objectifs
    const objectifs = [];
    let idx = 1;
    document.querySelectorAll('[id^="obj-texte-"]').forEach(inp => {
      const num = inp.id.replace('obj-texte-', '');
      const texte = inp.value.trim();
      const domaine = document.getElementById(`obj-domaine-${num}`)?.value || '';
      if (texte) {
        objectifs.push({ id: idx++, texte, domaine });
      }
    });

    const data = { nom, champAppr: ca, description: desc, niveaux, objectifs,
                   dateModif: new Date().toISOString() };
    try {
      if (apsaEnEdition) {
        await dbUpdate('apsa/' + apsaEnEdition.id, data);
        showToast('✓ APSA modifiée !', 'success');
      } else {
        await dbPush('apsa', { ...data, dateCreation: new Date().toISOString() });
        showToast('✓ APSA créée !', 'success');
      }
      fermerModal();
      chargerApsa();
    } catch(e) {
      showToast('❌ ' + e.message, 'error');
    }
  }

  async function editerApsa(id) {
    const data = await dbGet('apsa/' + id);
    if (data) ouvrirModal({ id, ...data });
  }

  async function supprimerApsa(id, nom) {
    if (!confirm(`Supprimer l'APSA "${nom}" ?\nToutes les évaluations associées resteront dans la base.`)) return;
    try {
      await dbRemove('apsa/' + id);
      showToast('🗑 APSA supprimée', 'success');
      chargerApsa();
    } catch(e) {
      showToast('❌ ' + e.message, 'error');
    }
  }

  function showToast(msg, type = 'success') {
    const t = document.createElement('div');
    t.className = `toast ${type}`;
    t.textContent = msg;
    document.body.appendChild(t);
    setTimeout(() => t.remove(), 3000);
  }

  // Fermer modal en cliquant dehors
  document.getElementById('modal-bg').addEventListener('click', e => {
    if (e.target.id === 'modal-bg') fermerModal();
  });

  chargerApsa();
</script>
</body>
</html>
