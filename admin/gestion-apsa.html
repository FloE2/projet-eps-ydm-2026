<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gestion des APSA — EPS</title>
  <link rel="stylesheet" href="../assets/style.css">
  <style>
    .apsa-card {
      background: var(--white);
      border: 2px solid var(--gray-1);
      border-radius: var(--radius);
      padding: 1.2rem 1.5rem;
      margin-bottom: 1rem;
      transition: all .2s;
    }
    .apsa-card:hover { border-color: var(--blue-lt); }
    .apsa-card-header {
      display: flex; align-items: center;
      justify-content: space-between;
      flex-wrap: wrap; gap: .5rem;
    }
    .apsa-titre { font-family: var(--font-h); font-size: 1.15rem; font-weight: 600; }
    .apsa-tags { display: flex; gap: .4rem; flex-wrap: wrap; align-items: center; }
    .apsa-tag { background: var(--gray-1); color: var(--gray-4); font-size: .75rem; padding: .15rem .6rem; border-radius: 12px; font-weight: 600; }
    .apsa-tag.ca { background: rgba(37,99,235,.1); color: var(--blue-lt); }
    .apsa-tag.niv { background: rgba(45,158,104,.1); color: var(--green); }
    .apsa-objectifs { margin-top: .8rem; padding-top: .8rem; border-top: 1px solid var(--gray-1); display: none; }
    .apsa-objectifs.open { display: block; }
    .obj-item { display: flex; align-items: flex-start; gap: .8rem; padding: .5rem; border-radius: 6px; margin-bottom: .4rem; background: var(--gray-1); font-size: .88rem; }
    .obj-num { width: 22px; height: 22px; background: var(--navy); color: #fff; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: .7rem; font-weight: 700; flex-shrink: 0; }
    .obj-descripteurs { display: grid; grid-template-columns: repeat(4,1fr); gap: .3rem; margin-top: .5rem; font-size: .75rem; }
    .obj-desc-cell { background: rgba(0,0,0,.04); border-radius: 4px; padding: .3rem .5rem; }
    .obj-desc-label { font-weight: 700; font-size: .65rem; text-transform: uppercase; margin-bottom: .2rem; }

    /* Modal */
    .modal-bg { position: fixed; inset: 0; background: rgba(0,0,0,.5); z-index: 200; display: flex; align-items: flex-start; justify-content: center; padding: 2rem 1rem; overflow-y: auto; }
    .modal-bg.hidden { display: none; }
    .modal { background: var(--white); border-radius: 16px; padding: 2rem; width: 100%; max-width: 760px; box-shadow: 0 30px 80px rgba(0,0,0,.3); position: relative; }
    .modal h2 { margin-bottom: 1.5rem; }
    .modal-close { position: absolute; top: 1rem; right: 1rem; background: var(--gray-1); border: none; width: 32px; height: 32px; border-radius: 50%; cursor: pointer; font-size: 1.1rem; display: flex; align-items: center; justify-content: center; }
    .modal-close:hover { background: var(--gray-2); }

    /* Objectif card dans le modal */
    .obj-card {
      background: var(--gray-1);
      border-radius: 10px;
      padding: .8rem 1rem;
      margin-bottom: .8rem;
      border-left: 4px solid var(--blue-lt);
    }
    .obj-card-header { display: grid; grid-template-columns: 1fr auto 36px; gap: .5rem; align-items: center; margin-bottom: .5rem; }
    .obj-card-header select { width: 100%; min-width: 140px; }
    .btn-del-obj { width: 32px; height: 32px; background: var(--red); color: #fff; border: none; border-radius: 6px; cursor: pointer; font-size: 1rem; display: flex; align-items: center; justify-content: center; }

    .desc-toggle { background: none; border: 1px solid var(--gray-2); border-radius: 4px; font-size: .75rem; color: var(--gray-3); cursor: pointer; padding: .2rem .6rem; margin-bottom: .5rem; width: 100%; text-align: left; }
    .desc-toggle:hover { background: var(--gray-2); color: var(--navy); }
    .desc-panel { display: none; }
    .desc-panel.open { display: grid; grid-template-columns: repeat(2,1fr); gap: .5rem; }
    .desc-field label { display: block; font-size: .72rem; font-weight: 700; text-transform: uppercase; margin-bottom: .25rem; }
    .desc-field label.lbl-NA  { color: #ef4444; }
    .desc-field label.lbl-ECA { color: #f59e0b; }
    .desc-field label.lbl-A   { color: #22c55e; }
    .desc-field label.lbl-D   { color: #8b5cf6; }
    .desc-field textarea { width: 100%; min-height: 70px; font-size: .78rem; resize: vertical; box-sizing: border-box; }

    .niveaux-check { display: flex; gap: 1rem; flex-wrap: wrap; }
    .niveaux-check label { display: flex; align-items: center; gap: .4rem; font-weight: 400; cursor: pointer; }
    .niveaux-check input[type="checkbox"] { width: auto; }

    /* ── Groupement par CA ── */
    .ca-section { margin-bottom: 2.5rem; }
    .ca-section-header {
      display: flex; align-items: center; gap: .8rem;
      padding: .7rem 1.2rem;
      background: var(--navy);
      border-radius: var(--radius) var(--radius) 0 0;
      margin-bottom: 0;
    }
    .ca-section-header h2 { color: #fff; font-size: 1rem; margin: 0; }
    .ca-section-header .ca-label { font-size: .78rem; color: rgba(255,255,255,.6); font-style: italic; }
    .ca-section-header.ca1 { background: linear-gradient(135deg, #1d4ed8, #2563eb); }
    .ca-section-header.ca2 { background: linear-gradient(135deg, #15803d, #16a34a); }
    .ca-section-header.ca3 { background: linear-gradient(135deg, #7c3aed, #8b5cf6); }
    .ca-section-header.ca4 { background: linear-gradient(135deg, #c2410c, #ea580c); }
    .ca-section-body { border: 2px solid var(--gray-1); border-top: none; border-radius: 0 0 var(--radius) var(--radius); padding: 1rem; background: #f8fafc; }

    /* ── Groupe par nom d'APSA ── */
    .apsa-group { margin-bottom: 1rem; }
    .apsa-group-title {
      font-family: var(--font-h); font-size: 1.05rem; font-weight: 700;
      color: var(--navy); padding: .5rem .8rem;
      border-left: 4px solid var(--gray-2);
      background: #fff; border-radius: 6px 6px 0 0;
      display: flex; align-items: center; gap: .6rem;
    }
    .apsa-group-body { display: flex; flex-direction: column; gap: .5rem; padding: .5rem; background: rgba(255,255,255,.5); border: 1px solid var(--gray-1); border-top: none; border-radius: 0 0 6px 6px; }

    /* ── Badges cycle ── */
    .badge-c3 { background: #dcfce7; color: #15803d; font-size: .72rem; font-weight: 700; padding: .15rem .55rem; border-radius: 10px; border: 1px solid #86efac; }
    .badge-c4 { background: #dbeafe; color: #1d4ed8; font-size: .72rem; font-weight: 700; padding: .15rem .55rem; border-radius: 10px; border: 1px solid #93c5fd; }
    .badge-all { background: #f3e8ff; color: #7c3aed; font-size: .72rem; font-weight: 700; padding: .15rem .55rem; border-radius: 10px; border: 1px solid #c4b5fd; }

    /* ── APSA card ── */
    .apsa-card { border-left: 3px solid var(--gray-2); padding-left: 1rem; }
    .apsa-card.cycle-c3 { border-left-color: #16a34a; }
    .apsa-card.cycle-c4 { border-left-color: #2563eb; }
  </style>
</head>
<body>

<nav class="topbar">
  <a href="dashboard.html" class="topbar-logo">← Dashboard</a>
  <span class="topbar-title">Gestion des APSA</span>
  <div class="topbar-nav">
    <a href="gestion-classes.html">Classes</a>
    <a href="gestion-apsa.html" class="active">APSA</a>
    <a href="bilan-classe.html">Bilans</a>
  </div>
</nav>

<div class="container">
  <div class="card-header" style="margin-bottom:1.5rem;">
    <h1>🏃 Activités Physiques, Sportives et Artistiques</h1>
    <button class="btn btn-orange" onclick="ouvrirModal()">+ Nouvelle APSA</button>
  </div>
  <div id="message"></div>
  <div id="liste-apsa">
    <div class="loader-wrap"><div class="spinner"></div><span>Chargement...</span></div>
  </div>
</div>

<!-- Modal création/édition APSA -->
<div class="modal-bg hidden" id="modal-bg">
  <div class="modal">
    <button class="modal-close" onclick="fermerModal()">✕</button>
    <h2 id="modal-titre">Nouvelle APSA</h2>

    <div class="form-group">
      <label>Nom de l'APSA *</label>
      <input type="text" id="f-nom" placeholder="Ex : Acrosport, Badminton, Course de durée...">
    </div>

    <div style="display:grid;grid-template-columns:1fr 1fr;gap:1rem;">
      <div class="form-group">
        <label>Champ d'apprentissage *</label>
        <select id="f-ca">
          <option value="">— Choisir —</option>
          <option value="CA1">CA1 · Performance optimale</option>
          <option value="CA2">CA2 · Environnements variés</option>
          <option value="CA3">CA3 · Expression / Acrobatie</option>
          <option value="CA4">CA4 · Affrontement</option>
        </select>
      </div>
      <div class="form-group">
        <label>Description courte</label>
        <input type="text" id="f-desc" placeholder="Ex : Sport collectif, duel...">
      </div>
    </div>

    <div class="form-group">
      <label>Niveaux concernés</label>
      <div class="niveaux-check">
        <label><input type="checkbox" class="chk-niv" value="6e" checked> 6e</label>
        <label><input type="checkbox" class="chk-niv" value="5e" checked> 5e</label>
        <label><input type="checkbox" class="chk-niv" value="4e" checked> 4e</label>
        <label><input type="checkbox" class="chk-niv" value="3e" checked> 3e</label>
      </div>
    </div>

    <hr style="border:none;border-top:2px solid var(--gray-1);margin:1.5rem 0;">

    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:.5rem;">
      <h3>Objectifs à évaluer</h3>
      <button class="btn btn-ghost btn-sm" onclick="ajouterObjectif()">+ Ajouter un objectif</button>
    </div>
    <p class="text-muted text-small" style="margin-bottom:1rem;">
      Pour chaque objectif : saisissez le texte, le domaine du socle, et optionnellement les descripteurs de chaque niveau (affichés aux élèves).
    </p>
    <div id="objectifs-list"></div>

    <div style="display:flex;gap:1rem;margin-top:1.5rem;justify-content:flex-end;">
      <button class="btn btn-ghost" onclick="fermerModal()">Annuler</button>
      <button class="btn btn-orange btn-lg" onclick="sauvegarderApsa()">💾 Enregistrer l'APSA</button>
    </div>
  </div>
</div>

<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
<script src="../firebase-config.js"></script>
<script>
  requireProf();

  let apsaEnEdition = null;

  // ── Détecter le cycle d'une APSA depuis ses niveaux ────────
  function detecterCycle(niveaux) {
    const n = niveaux || [];
    const a6 = n.includes('6e');
    const a5 = n.includes('5e') || n.includes('4e') || n.includes('3e');
    if (a6 && !a5) return 'C3';
    if (a5 && !a6) return 'C4';
    return 'ALL'; // les deux
  }

  // ── Infos des champs d'apprentissage ────────────────────────
  const CA_INFO = {
    CA1: { label:'Produire une performance optimale, mesurable à une échéance donnée', icon:'⏱️', cls:'ca1' },
    CA2: { label:'Adapter ses déplacements à des environnements variés',               icon:'🌿', cls:'ca2' },
    CA3: { label:"S'exprimer devant les autres par une prestation acrobatique ou artistique", icon:'🎭', cls:'ca3' },
    CA4: { label:'Conduire et maîtriser un affrontement collectif ou interindividuel', icon:'⚔️', cls:'ca4' },
  };

  // ── Rendu d'une carte APSA ───────────────────────────────────
  function renderApsaCard(a) {
    const cycle = detecterCycle(a.niveaux);
    const niveaux = (a.niveaux || []).join(', ');
    const nbObj = (a.objectifs || []).length;
    const cycleCls = cycle === 'C3' ? 'cycle-c3' : cycle === 'C4' ? 'cycle-c4' : '';
    const cycleBadge = cycle === 'C3'
      ? '<span class="badge-c3">🟢 Cycle 3 — 6e</span>'
      : cycle === 'C4'
        ? '<span class="badge-c4">🔵 Cycle 4 — 5e/4e/3e</span>'
        : '<span class="badge-all">🔷 Tous cycles</span>';

    return `
      <div class="apsa-card ${cycleCls}">
        <div class="apsa-card-header">
          <div>
            <div class="apsa-tags" style="margin-bottom:.3rem;">
              ${cycleBadge}
              <span class="apsa-tag niv">📚 ${niveaux || '—'}</span>
              <span class="apsa-tag">🎯 ${nbObj} objectif${nbObj>1?'s':''}</span>
            </div>
            ${a.description ? `<div style="font-size:.82rem;color:var(--gray-3);font-style:italic;">${a.description}</div>` : ''}
          </div>
          <div style="display:flex;gap:.5rem;flex-shrink:0;">
            <button class="btn btn-ghost btn-sm" onclick="toggleObjectifs('${a.id}')">👁 Voir</button>
            <button class="btn btn-outline btn-sm" onclick="editerApsa('${a.id}')">✏️ Modifier</button>
            <button class="btn btn-danger btn-sm" onclick="supprimerApsa('${a.id}','${a.nom}')">🗑</button>
          </div>
        </div>
        <div class="apsa-objectifs" id="obj-${a.id}">
          ${(a.objectifs||[]).map((obj,i) => {
            const d = obj.descripteurs || {};
            const hasDesc = d.NA || d.ECA || d.A || d.D;
            return `
            <div class="obj-item" style="flex-direction:column;">
              <div style="display:flex;align-items:center;gap:.8rem;width:100%;">
                <div class="obj-num">${obj.id||i+1}</div>
                <div><strong>[${obj.domaine||'—'}]</strong> ${obj.texte}</div>
              </div>
              ${hasDesc ? `
              <div class="obj-descripteurs" style="margin-top:.6rem;margin-left:36px;">
                ${['NA','ECA','A','D'].map(code => d[code] ? `
                  <div class="obj-desc-cell">
                    <div class="obj-desc-label" style="color:${code==='NA'?'#ef4444':code==='ECA'?'#f59e0b':code==='A'?'#22c55e':'#8b5cf6'}">${code==='D'?'Dépassé':code}</div>
                    <div>${d[code]}</div>
                  </div>` : `<div class="obj-desc-cell" style="opacity:.3;font-style:italic;font-size:.72rem;">${code==='D'?'Dépassé':code} —</div>`).join('')}
              </div>` : ''}
            </div>`;
          }).join('') || '<p class="text-muted text-small">Aucun objectif défini.</p>'}
        </div>
      </div>`;
  }

  async function chargerApsa() {
    const el = document.getElementById('liste-apsa');
    try {
      const apsa = await getToutesApsa();
      if (apsa.length === 0) {
        el.innerHTML = `<div class="alert alert-info">ℹ️ Aucune APSA créée. Commencez par en créer une !
          <button class="btn btn-orange btn-sm" onclick="ouvrirModal()" style="margin-left:1rem">+ Créer</button></div>`;
        return;
      }

      // ── 1. Grouper par CA puis par nom ────────────────────────
      const grouped = { CA1: {}, CA2: {}, CA3: {}, CA4: {} };
      const autres = {};

      for (const a of apsa) {
        const ca = a.champAppr || 'Autre';
        const nom = a.nom || '—';
        if (!grouped[ca]) grouped[ca] = {};
        if (!grouped[ca][nom]) grouped[ca][nom] = [];
        grouped[ca][nom].push(a);
      }

      // ── 2. Trier les entrées dans chaque groupe (C3 avant C4) ─
      for (const ca of Object.keys(grouped)) {
        for (const nom of Object.keys(grouped[ca])) {
          grouped[ca][nom].sort((a, b) => {
            const ca = detecterCycle(a.niveaux);
            const cb = detecterCycle(b.niveaux);
            return (ca === 'C3' ? 0 : 1) - (cb === 'C3' ? 0 : 1);
          });
        }
      }

      // ── 3. Render ─────────────────────────────────────────────
      let html = '';
      for (const ca of ['CA1','CA2','CA3','CA4']) {
        const noms = Object.keys(grouped[ca] || {});
        if (noms.length === 0) continue;

        const info = CA_INFO[ca] || { label: ca, icon: '🏅', cls: '' };
        const totalApsa = noms.length;
        const totalEntrees = noms.reduce((s, n) => s + grouped[ca][n].length, 0);

        html += `
        <div class="ca-section">
          <div class="ca-section-header ${info.cls}">
            <span style="font-size:1.3rem;">${info.icon}</span>
            <div>
              <h2>${ca}</h2>
              <span class="ca-label">${info.label} · ${totalApsa} APSA · ${totalEntrees} version${totalEntrees>1?'s':''}</span>
            </div>
          </div>
          <div class="ca-section-body">`;

        for (const nom of noms.sort()) {
          const entries = grouped[ca][nom];
          const hasBoth = entries.length > 1;
          html += `
            <div class="apsa-group">
              <div class="apsa-group-title">
                ${nom}
                ${hasBoth ? '<span style="font-size:.72rem;color:var(--gray-3);font-weight:400;">— 2 versions</span>' : ''}
              </div>
              <div class="apsa-group-body">
                ${entries.map(a => renderApsaCard(a)).join('')}
              </div>
            </div>`;
        }

        html += `</div></div>`;
      }

      el.innerHTML = html;
    } catch(e) {
      el.innerHTML = `<div class="alert alert-error">❌ ${e.message}</div>`;
    }
  }

  function toggleObjectifs(id) {
    document.getElementById('obj-' + id)?.classList.toggle('open');
  }

  // ── Modal ───────────────────────────────────────────────────
  let objCounter = 0;

  function ouvrirModal(data = null) {
    apsaEnEdition = data;
    objCounter = 0;
    document.getElementById('modal-titre').textContent = data ? "Modifier l'APSA" : 'Nouvelle APSA';
    document.getElementById('f-nom').value  = data?.nom  || '';
    document.getElementById('f-ca').value   = data?.champAppr || '';
    document.getElementById('f-desc').value = data?.description || '';
    document.querySelectorAll('.chk-niv').forEach(cb => {
      cb.checked = data ? (data.niveaux||[]).includes(cb.value) : true;
    });
    document.getElementById('objectifs-list').innerHTML = '';
    if (data?.objectifs?.length) {
      data.objectifs.forEach(obj => ajouterObjectif(obj));
    } else {
      ajouterObjectif();
    }
    document.getElementById('modal-bg').classList.remove('hidden');
    document.getElementById('f-nom').focus();
  }

  function fermerModal() {
    document.getElementById('modal-bg').classList.add('hidden');
    apsaEnEdition = null;
  }

  function ajouterObjectif(data = null) {
    objCounter++;
    const n = objCounter;
    const domainesOptions = Object.entries(window.DOMAINES_SOCLE).map(([code, label]) =>
      `<option value="${code}" ${data?.domaine===code?'selected':''}>${code} · ${label.substring(0,30)}</option>`
    ).join('');
    const d = data?.descripteurs || {};

    const div = document.createElement('div');
    div.className = 'obj-card';
    div.id = `obj-line-${n}`;
    div.innerHTML = `
      <div class="obj-card-header">
        <input type="text" placeholder="Objectif ${n} : Décrire la compétence attendue..."
          value="${data?.texte||''}" id="obj-texte-${n}" style="font-weight:600;">
        <select id="obj-domaine-${n}">
          <option value="">Domaine</option>
          ${domainesOptions}
        </select>
        <button class="btn-del-obj" onclick="supprimerLigneObj(${n})">×</button>
      </div>
      <button class="desc-toggle" id="desc-btn-${n}" onclick="toggleDesc(${n})">
        📋 Descripteurs de niveaux (${(d.NA||d.ECA||d.A||d.D) ? 'saisis' : 'optionnels — cliquer pour saisir'})
      </button>
      <div class="desc-panel ${(d.NA||d.ECA||d.A||d.D)?'open':''}" id="desc-panel-${n}">
        <div class="desc-field">
          <label class="lbl-NA">✕ Non Acquis (NA)</label>
          <textarea id="obj-desc-NA-${n}" placeholder="Ce que fait l'élève quand l'objectif n'est pas atteint...">${d.NA||''}</textarea>
        </div>
        <div class="desc-field">
          <label class="lbl-ECA">⊙ En cours d'acquisition (ECA)</label>
          <textarea id="obj-desc-ECA-${n}" placeholder="Ce que fait l'élève quand l'objectif est partiellement atteint...">${d.ECA||''}</textarea>
        </div>
        <div class="desc-field">
          <label class="lbl-A">✓ Acquis (A)</label>
          <textarea id="obj-desc-A-${n}" placeholder="Ce que fait l'élève quand l'objectif est atteint...">${d.A||''}</textarea>
        </div>
        <div class="desc-field">
          <label class="lbl-D">★ Dépassé (D)</label>
          <textarea id="obj-desc-D-${n}" placeholder="Ce que fait l'élève quand l'objectif est dépassé...">${d.D||''}</textarea>
        </div>
      </div>`;
    document.getElementById('objectifs-list').appendChild(div);
  }

  function toggleDesc(n) {
    const panel = document.getElementById(`desc-panel-${n}`);
    panel.classList.toggle('open');
  }

  function supprimerLigneObj(n) {
    document.getElementById(`obj-line-${n}`)?.remove();
  }

  async function sauvegarderApsa() {
    const nom  = document.getElementById('f-nom').value.trim();
    const ca   = document.getElementById('f-ca').value;
    const desc = document.getElementById('f-desc').value.trim();
    if (!nom || !ca) { showToast('⚠️ Remplissez le nom et le champ d\'apprentissage', 'error'); return; }

    const niveaux = [...document.querySelectorAll('.chk-niv:checked')].map(cb => cb.value);

    const objectifs = [];
    let idx = 1;
    document.querySelectorAll('[id^="obj-texte-"]').forEach(inp => {
      const num = inp.id.replace('obj-texte-', '');
      const texte = inp.value.trim();
      if (!texte) return;
      const domaine = document.getElementById(`obj-domaine-${num}`)?.value || '';
      const descripteurs = {
        NA:  document.getElementById(`obj-desc-NA-${num}`)?.value.trim()  || '',
        ECA: document.getElementById(`obj-desc-ECA-${num}`)?.value.trim() || '',
        A:   document.getElementById(`obj-desc-A-${num}`)?.value.trim()   || '',
        D:   document.getElementById(`obj-desc-D-${num}`)?.value.trim()   || ''
      };
      objectifs.push({ id: idx++, texte, domaine, descripteurs });
    });

    const data = { nom, champAppr: ca, description: desc, niveaux, objectifs, dateModif: new Date().toISOString() };
    try {
      if (apsaEnEdition) {
        await dbUpdate('apsa/' + apsaEnEdition.id, data);
        showToast('✓ APSA modifiée !', 'success');
      } else {
        await dbPush('apsa', { ...data, dateCreation: new Date().toISOString() });
        showToast('✓ APSA créée !', 'success');
      }
      fermerModal();
      chargerApsa();
    } catch(e) {
      showToast('❌ ' + e.message, 'error');
    }
  }

  async function editerApsa(id) {
    const data = await dbGet('apsa/' + id);
    if (data) ouvrirModal({ id, ...data });
  }

  async function supprimerApsa(id, nom) {
    if (!confirm(`Supprimer l'APSA "${nom}" ?`)) return;
    try {
      await dbRemove('apsa/' + id);
      showToast('🗑 APSA supprimée', 'success');
      chargerApsa();
    } catch(e) { showToast('❌ ' + e.message, 'error'); }
  }

  function showToast(msg, type = 'success') {
    const t = document.createElement('div');
    t.className = `toast ${type}`;
    t.textContent = msg;
    document.body.appendChild(t);
    setTimeout(() => t.remove(), 3000);
  }

  document.getElementById('modal-bg').addEventListener('click', e => {
    if (e.target.id === 'modal-bg') fermerModal();
  });

  chargerApsa();
</script>
</body>
</html>
