<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sélection de classe — EPS</title>
  <link rel="stylesheet" href="../assets/style.css">
  <style>
    .cycle-card {
      background: var(--white);
      border: 2px solid var(--gray-1);
      border-radius: var(--radius);
      padding: 1rem 1.5rem;
      margin-bottom: .8rem;
      cursor: pointer;
      transition: all .2s;
      display: flex;
      align-items: center;
      justify-content: space-between;
      text-decoration: none;
      color: var(--navy);
    }
    .cycle-card:hover {
      border-color: var(--orange);
      transform: translateX(4px);
    }
    .cycle-apsa { font-family: var(--font-h); font-size: 1.1rem; font-weight: 600; }
    .cycle-meta { font-size: .82rem; color: var(--gray-3); margin-top: .2rem; }
    .cycle-badge {
      background: var(--orange);
      color: #fff;
      font-family: var(--font-h);
      font-size: .75rem;
      padding: .2rem .6rem;
      border-radius: 12px;
      letter-spacing: .05em;
    }
    .step { display: none; }
    .step.active { display: block; }
    .back-btn {
      display: inline-flex;
      align-items: center;
      gap: .4rem;
      color: var(--gray-3);
      cursor: pointer;
      font-size: .9rem;
      margin-bottom: 1.5rem;
      background: none;
      border: none;
      padding: 0;
    }
    .back-btn:hover { color: var(--blue-lt); }
    .search-input {
      margin-bottom: 1.2rem;
      position: relative;
    }
    .search-input input {
      padding-left: 2.8rem;
    }
    .search-icon {
      position: absolute;
      left: 1rem;
      top: 50%;
      transform: translateY(-50%);
      color: var(--gray-3);
      pointer-events: none;
    }
  </style>
</head>
<body>

<nav class="topbar">
  <a href="../index.html" class="topbar-logo">⚡ EPS</a>
  <span class="topbar-title" id="college-nom"></span>
</nav>

<div class="container-sm">

  <!-- ÉTAPE 1 : Choix de la classe -->
  <div class="step active" id="step-classe">
    <div class="card">
      <div class="card-header">
        <h2>📚 Sélectionne ta classe</h2>
      </div>
      <div id="liste-classes">
        <div class="loader-wrap"><div class="spinner"></div><span>Chargement...</span></div>
      </div>
    </div>
  </div>

  <!-- ÉTAPE 2 : Choix du cycle (APSA) -->
  <div class="step" id="step-cycle">
    <button class="back-btn" onclick="changerDeClasse()">← Changer de classe</button>
    <div class="card">
      <div class="card-header">
        <div>
          <h2 id="titre-cycle">Cycles en cours</h2>
          <p class="text-muted text-small" id="sous-titre-cycle"></p>
        </div>
      </div>
      <div id="liste-cycles">
        <div class="loader-wrap"><div class="spinner"></div><span>Chargement...</span></div>
      </div>
    </div>
  </div>

  <!-- ÉTAPE 3 : Choix de l'élève -->
  <div class="step" id="step-eleve">
    <button class="back-btn" onclick="retour('step-cycle')">← Retour aux APSA</button>
    <div class="card">
      <div class="card-header">
        <div>
          <h2 id="titre-eleve">Qui es-tu ?</h2>
          <p class="text-muted text-small" id="apsa-choisie"></p>
        </div>
      </div>
      <div class="search-input">
        <span class="search-icon">🔍</span>
        <input type="text" id="recherche-eleve" placeholder="Rechercher un élève..." oninput="filtrerEleves()">
      </div>
      <div id="liste-eleves" class="eleve-grid">
        <div class="loader-wrap"><div class="spinner"></div><span>Chargement...</span></div>
      </div>
    </div>
  </div>

</div>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
<script src="../firebase-config.js"></script>
<script>
  document.getElementById('college-nom').textContent = window.COLLEGE_NOM;

  let classeSelectionnee = null;
  let cycleSelectionne   = null;
  let tousLesEleves      = [];

  // ── Étape 1 : chargement des classes ──────────────────────
  async function chargerClasses() {
    const el = document.getElementById('liste-classes');
    try {
      const classes = await getClasses();
      if (classes.length === 0) {
        el.innerHTML = '<div class="alert alert-info">ℹ️ Aucune classe configurée. Contactez votre professeur.</div>';
        return;
      }
      // Grouper par niveau
      const niveaux = {};
      classes.forEach(c => {
        const niv = c.niveau || '?';
        if (!niveaux[niv]) niveaux[niv] = [];
        niveaux[niv].push(c);
      });
      let html = '';
      const ordreNiveaux = ['6e','5e','4e','3e'];
      ordreNiveaux.forEach(niv => {
        if (!niveaux[niv]) return;
        html += `<h3 style="font-family:var(--font-h);color:var(--gray-3);font-size:.8rem;letter-spacing:.1em;margin:.8rem 0 .4rem;">${niv}</h3>`;
        niveaux[niv].forEach(c => {
          html += `
            <div class="cycle-card" onclick="choisirClasse('${c.id}','${c.nom}','${c.niveau}')">
              <div>
                <div class="cycle-apsa">${c.nom}</div>
                <div class="cycle-meta">${c.niveau} · ${window.ANNEE_SCOLAIRE}</div>
              </div>
              <span>→</span>
            </div>`;
        });
      });
      el.innerHTML = html;
    } catch(e) {
      el.innerHTML = `<div class="alert alert-error">❌ Erreur de chargement : ${e.message}</div>`;
    }
  }

  async function choisirClasse(id, nom, niveau) {
    classeSelectionnee = { id, nom, niveau };
    // 🔒 Verrouiller la classe en session (élèves uniquement, pas les profs)
    if (!localStorage.getItem('eps_prof')) {
      sessionStorage.setItem('eps_classeId',  id);
      sessionStorage.setItem('eps_classeNom', nom);
      sessionStorage.setItem('eps_classeNiv', niveau);
    }
    document.getElementById('titre-cycle').textContent = `APSA en cours — ${nom}`;
    document.getElementById('sous-titre-cycle').textContent = `Clique sur l'activité que tu es en train de travailler`;
    afficher('step-cycle');
    await chargerCycles(id, nom, niveau);
  }

  // ── Étape 2 : APSA depuis la programmation (source de vérité) ─
  async function chargerCycles(classeId, classeNom, niveau) {
    const el = document.getElementById('liste-cycles');
    el.innerHTML = '<div class="loader-wrap"><div class="spinner"></div><span>Chargement...</span></div>';
    try {
      // Lire depuis programmation/{classeNom} comme le dashboard
      const [progClasse, toutesApsa, tousCycles] = await Promise.all([
        dbGet('programmation/' + classeNom),
        getToutesApsa(),
        getTousCycles()
      ]);

      if (!progClasse) {
        el.innerHTML = '<div class="alert alert-info">ℹ️ Aucune programmation configurée pour cette classe.</div>';
        return;
      }

      // Index APSA par nom (fuzzy) et par id
      function matchApsa(slotNom) {
        return toutesApsa.find(a => {
          const an = a.nom.toLowerCase().trim();
          const sn = slotNom.toLowerCase().trim();
          return an===sn || an.includes(sn) || sn.includes(an) ||
                 sn.split('/').some(p=>an.includes(p.trim())) ||
                 an.split('/').some(p=>sn.includes(p.trim()));
        });
      }

      // Cycles de cette classe indexés par apsaId
      const cyclesParApsa = {};
      tousCycles.filter(c => c.classeId === classeId).forEach(c => {
        if (!cyclesParApsa[c.apsaId]) cyclesParApsa[c.apsaId] = [];
        cyclesParApsa[c.apsaId].push(c);
      });

      const PERIODES = ['P1','P2','P3','P4'];
      const PERIODE_COLORS = { P1:'#3B82F6', P2:'#10b981', P3:'#f59e0b', P4:'#ef4444' };
      const aujourd_hui = new Date();

      let html = '';
      let totalApsa = 0;

      PERIODES.forEach(p => {
        const periode = progClasse[p];
        if (!periode?.slots?.length) return;

        periode.slots.forEach(slotNom => {
          const apsa = matchApsa(slotNom);
          if (!apsa) return;
          totalApsa++;

          // Trouver le cycle correspondant
          const cyclesApsa = cyclesParApsa[apsa.id] || [];
          const cycle = cyclesApsa[0]; // prendre le premier cycle trouvé
          const cycleId = cycle?.id || null;

          // Déterminer le statut
          let badge = '', badgeStyle = '';
          if (cycle) {
            const debut = cycle.dateDebut ? new Date(cycle.dateDebut) : null;
            const fin   = cycle.dateFin   ? new Date(cycle.dateFin)   : null;
            if (fin && aujourd_hui > fin) {
              badge = 'TERMINÉE'; badgeStyle = 'background:#6b7280;';
            } else if (debut && aujourd_hui < debut) {
              badge = 'À VENIR'; badgeStyle = 'background:#94a3b8;';
            } else {
              badge = 'EN COURS'; badgeStyle = '';
            }
          } else {
            badge = 'EN COURS'; badgeStyle = '';
          }

          const ca = window.CHAMPS_APPRENTISSAGE[apsa.champAppr] || apsa.champAppr || '';
          const debut = cycle?.dateDebut ? new Date(cycle.dateDebut).toLocaleDateString('fr-FR') : '';
          const fin   = cycle?.dateFin   ? new Date(cycle.dateFin).toLocaleDateString('fr-FR')   : '';

          // Si pas de cycleId on ne peut pas naviguer → désactiver le clic
          const onclick = cycleId
            ? `onclick="choisirCycle('${cycleId}','${apsa.nom}','${apsa.id}')"`
            : `onclick="alert('Ce cycle n\\'a pas encore été créé. Contactez votre professeur.')"`;

          html += `
            <div class="cycle-card" ${onclick} style="${badge==='À VENIR'?'opacity:.55;':''}">
              <div>
                <div style="display:flex;align-items:center;gap:.5rem;margin-bottom:.2rem;">
                  <span style="background:${PERIODE_COLORS[p]};color:#fff;border-radius:4px;padding:.1rem .4rem;font-size:.62rem;font-weight:800;">${p}</span>
                  <div class="cycle-apsa">${apsa.nom}</div>
                </div>
                <div class="cycle-meta">${apsa.champAppr ? apsa.champAppr + ' · ' : ''}${ca.substring(0,45)}${ca.length>45?'…':''}</div>
                ${debut ? `<div class="cycle-meta">📅 ${debut}${fin ? ' → '+fin : ''}</div>` : ''}
              </div>
              <span class="cycle-badge" style="${badgeStyle}">${badge}</span>
            </div>`;
        });
      });

      if (!totalApsa) {
        el.innerHTML = '<div class="alert alert-info">ℹ️ Aucune APSA dans la programmation.</div>';
      } else {
        el.innerHTML = html;
      }
    } catch(e) {
      el.innerHTML = `<div class="alert alert-error">❌ ${e.message}</div>`;
    }
  }

  async function choisirCycle(cycleId, apsaNom, apsaId) {
    cycleSelectionne = { cycleId, apsaNom, apsaId };
    document.getElementById('titre-eleve').textContent = `Qui es-tu ?`;
    document.getElementById('apsa-choisie').textContent = `APSA : ${apsaNom}`;
    afficher('step-eleve');
    await chargerEleves(classeSelectionnee.id);
  }

  // ── Étape 3 : liste des élèves ─────────────────────────────
  async function chargerEleves(classeId) {
    const el = document.getElementById('liste-eleves');
    el.innerHTML = '<div class="loader-wrap"><div class="spinner"></div><span>Chargement...</span></div>';
    try {
      tousLesEleves = await getEleves(classeId);
      afficherEleves(tousLesEleves);
    } catch(e) {
      el.innerHTML = `<div class="alert alert-error">❌ ${e.message}</div>`;
    }
  }

  function afficherEleves(eleves) {
    const el = document.getElementById('liste-eleves');
    if (eleves.length === 0) {
      el.innerHTML = '<div class="alert alert-info">ℹ️ Aucun élève trouvé.</div>';
      return;
    }
    el.innerHTML = eleves.map(e => {
      const initiales = (e.prenom?.[0]||'') + (e.nom?.[0]||'');
      const url = `fiche.html?eleveId=${e.id}&cycleId=${cycleSelectionne.cycleId}&apsaId=${cycleSelectionne.apsaId}&niveau=${classeSelectionnee.niveau}&classeId=${classeSelectionnee.id}`;
      return `
        <a href="${url}" class="eleve-card">
          <div class="eleve-initiales">${initiales.toUpperCase()}</div>
          <div class="eleve-prenom">${e.prenom}</div>
          <div class="eleve-nom">${e.nom.toUpperCase()}</div>
        </a>`;
    }).join('');
  }

  function filtrerEleves() {
    const q = document.getElementById('recherche-eleve').value.toLowerCase();
    const filtres = tousLesEleves.filter(e =>
      (e.nom+e.prenom).toLowerCase().includes(q)
    );
    afficherEleves(filtres);
  }

  // ── Navigation ─────────────────────────────────────────────
  function afficher(stepId) {
    document.querySelectorAll('.step').forEach(s => s.classList.remove('active'));
    document.getElementById(stepId).classList.add('active');
  }
  function retour(stepId) { afficher(stepId); }
  function changerDeClasse() {
    sessionStorage.removeItem('eps_classeId');
    sessionStorage.removeItem('eps_classeNom');
    sessionStorage.removeItem('eps_classeNiv');
    afficher('step-classe');
  }

  async function init() {
    await chargerClasses();

    const p = new URLSearchParams(window.location.search);
    const retourClasseId = p.get('classeId');
    const retourCycleId  = p.get('cycleId');

    // Priorité 1 : retour depuis fiche.html (classeId+cycleId dans URL)
    if (retourClasseId && retourCycleId) {
      try {
        const classes = await getClasses();
        const cl = classes.find(c => c.id === retourClasseId);
        if (cl) {
          await choisirClasse(cl.id, cl.nom, cl.niveau);
          const tousCycles = await getTousCycles();
          const cy = tousCycles.find(c => c.id === retourCycleId);
          if (cy) {
            const apsa = await getApsa(cy.apsaId);
            await choisirCycle(cy.id, apsa?.nom || '', cy.apsaId);
          }
        }
      } catch(e) { /* silencieux */ }
      return;
    }

    // Priorité 2 : classe déjà verrouillée en session (élèves uniquement)
    const estProf = !!localStorage.getItem('eps_prof');
    const sessId  = sessionStorage.getItem('eps_classeId');
    const sessNom = sessionStorage.getItem('eps_classeNom');
    const sessNiv = sessionStorage.getItem('eps_classeNiv');
    if (!estProf && sessId && sessNom && sessNiv) {
      try {
        await choisirClasse(sessId, sessNom, sessNiv);
      } catch(e) { sessionStorage.clear(); }
    }
  }
  init();
</script>
</body>
</html>
