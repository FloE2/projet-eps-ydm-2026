<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sélection de classe — EPS</title>
  <link rel="stylesheet" href="../assets/style.css">
  <style>
    body { background: #f4f6fa; }
    .step { display: none; }
    .step.active { display: block; }

    .classe-card {
      background: var(--white); border: 2px solid var(--gray-1);
      border-radius: var(--radius); padding: 1rem 1.5rem;
      margin-bottom: .75rem; cursor: pointer; transition: all .2s;
      display: flex; align-items: center; justify-content: space-between;
      color: var(--navy);
    }
    .classe-card:hover { border-color: var(--orange); transform: translateX(4px); box-shadow: 0 4px 16px rgba(0,0,0,.1); }
    .classe-card-nom  { font-family: var(--font-h); font-size: 1.1rem; font-weight: 700; }
    .classe-card-meta { font-size: .82rem; color: var(--gray-3); margin-top: .15rem; }
    .niveau-label { font-family: var(--font-h); color: var(--gray-3); font-size: .8rem; letter-spacing: .1em; text-transform: uppercase; margin: 1rem 0 .4rem; }

    .back-btn { display: inline-flex; align-items: center; gap: .4rem; color: var(--gray-3); cursor: pointer; font-size: .9rem; margin-bottom: 1.5rem; background: none; border: none; padding: 0; font-family: var(--font-b); }
    .back-btn:hover { color: var(--navy); }

    .search-wrap { position: relative; margin-bottom: 1.2rem; }
    .search-wrap input { padding-left: 2.8rem; }
    .search-icon { position: absolute; left: 1rem; top: 50%; transform: translateY(-50%); color: var(--gray-3); pointer-events: none; }

    .eleve-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(130px, 1fr)); gap: .75rem; }
    .eleve-card { background: #fff; border: 2px solid var(--gray-1); border-radius: 12px; padding: 1rem .75rem; text-align: center; cursor: pointer; text-decoration: none; color: var(--navy); transition: all .18s; display: block; }
    .eleve-card:hover { border-color: var(--orange); transform: translateY(-2px); box-shadow: 0 6px 20px rgba(0,0,0,.1); }
    .eleve-initiales { width: 48px; height: 48px; background: linear-gradient(135deg, var(--navy), #1e4d8c); color: #fff; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-family: var(--font-h); font-size: 1.05rem; font-weight: 700; margin: 0 auto .65rem; }
    .eleve-prenom { font-size: .8rem; color: var(--gray-3); margin-bottom: 2px; }
    .eleve-nom    { font-size: .85rem; font-weight: 700; color: var(--navy); }
  </style>
</head>
<body>
<nav class="topbar">
  <a href="../index.html" class="topbar-logo">⚡ EPS</a>
  <span class="topbar-title" id="college-nom"></span>
</nav>
<div class="container-sm">

  <!-- ÉTAPE 1 : Classe -->
  <div class="step active" id="step-classe">
    <div class="card">
      <div class="card-header"><h2>📚 Sélectionne ta classe</h2></div>
      <div id="liste-classes">
        <div class="loader-wrap"><div class="spinner"></div><span>Chargement...</span></div>
      </div>
    </div>
  </div>

  <!-- ÉTAPE 2 : Élève -->
  <div class="step" id="step-eleve">
    <button class="back-btn" onclick="retour('step-classe')">← Retour aux classes</button>
    <div class="card">
      <div class="card-header">
        <div>
          <h2>Qui es-tu ?</h2>
          <p class="text-muted text-small" id="sous-titre-eleve"></p>
        </div>
      </div>
      <div class="search-wrap">
        <span class="search-icon">🔍</span>
        <input type="text" id="recherche-eleve" placeholder="Rechercher ton prénom ou nom..." oninput="filtrerEleves()">
      </div>
      <div id="liste-eleves" class="eleve-grid">
        <div class="loader-wrap"><div class="spinner"></div><span>Chargement...</span></div>
      </div>
    </div>
  </div>

</div>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
<script src="../firebase-config.js"></script>
<script>
  document.getElementById('college-nom').textContent = window.COLLEGE_NOM;
  let classeSelectionnee = null, tousLesEleves = [];

  async function chargerClasses() {
    const el = document.getElementById('liste-classes');
    try {
      const classes = await getClasses();
      if (!classes.length) { el.innerHTML = '<div class="alert alert-info">ℹ️ Aucune classe configurée.</div>'; return; }
      const parNiveau = {};
      classes.forEach(c => { const n = c.niveau||'?'; if (!parNiveau[n]) parNiveau[n]=[]; parNiveau[n].push(c); });
      let html = '';
      ['6e','5e','4e','3e'].forEach(niv => {
        if (!parNiveau[niv]) return;
        html += `<div class="niveau-label">${niv}</div>`;
        parNiveau[niv].forEach(c => {
          html += `<div class="classe-card" onclick="choisirClasse('${c.id}','${c.nom}','${c.niveau}')">
            <div><div class="classe-card-nom">${c.nom}</div><div class="classe-card-meta">${c.niveau} · ${window.ANNEE_SCOLAIRE}</div></div>
            <span style="color:var(--orange);font-size:1.1rem;">→</span>
          </div>`;
        });
      });
      el.innerHTML = html;
    } catch(e) { el.innerHTML = `<div class="alert alert-error">❌ ${e.message}</div>`; }
  }

  async function choisirClasse(id, nom, niveau) {
    classeSelectionnee = { id, nom, niveau };
    document.getElementById('sous-titre-eleve').textContent = `Classe ${nom} · ${niveau}`;
    afficher('step-eleve');
    const el = document.getElementById('liste-eleves');
    el.innerHTML = '<div class="loader-wrap"><div class="spinner"></div><span>Chargement...</span></div>';
    try {
      tousLesEleves = await getEleves(id);
      afficherEleves(tousLesEleves);
    } catch(e) { el.innerHTML = `<div class="alert alert-error">❌ ${e.message}</div>`; }
  }

  function afficherEleves(eleves) {
    const el = document.getElementById('liste-eleves');
    if (!eleves.length) { el.innerHTML = '<div class="alert alert-info">ℹ️ Aucun élève trouvé.</div>'; return; }
    el.innerHTML = eleves.map(e => {
      const init = (e.prenom?.[0]||'') + (e.nom?.[0]||'');
      // ⚠️ URL avec classeId + niveau (pas cycleId ni apsaId)
      const url = `fiche.html?eleveId=${e.id}&classeId=${classeSelectionnee.id}&niveau=${classeSelectionnee.niveau}`;
      return `<a href="${url}" class="eleve-card">
        <div class="eleve-initiales">${init.toUpperCase()}</div>
        <div class="eleve-prenom">${e.prenom}</div>
        <div class="eleve-nom">${(e.nom||'').toUpperCase()}</div>
      </a>`;
    }).join('');
  }

  function filtrerEleves() {
    const q = document.getElementById('recherche-eleve').value.toLowerCase();
    afficherEleves(tousLesEleves.filter(e => (e.nom+' '+e.prenom).toLowerCase().includes(q)));
  }

  function afficher(id) { document.querySelectorAll('.step').forEach(s=>s.classList.remove('active')); document.getElementById(id).classList.add('active'); }
  function retour(id) { afficher(id); }
  chargerClasses();
</script>
</body>
</html>
