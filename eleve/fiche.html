<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mes APSA — EPS</title>
  <link rel="stylesheet" href="../assets/style.css">
  <style>
    body { background: #f4f6fa; padding-bottom: 40px; }

    /* ── En-tête élève ── */
    .fiche-hero {
      background: linear-gradient(135deg, var(--navy) 0%, #1a3f7a 100%);
      color: #fff; border-radius: var(--radius);
      padding: 1.3rem 1.8rem; margin-bottom: 1.4rem;
      display: flex; align-items: center; gap: 1.1rem; flex-wrap: wrap;
    }
    .fiche-avatar {
      width: 50px; height: 50px; background: rgba(255,255,255,.18);
      border-radius: 50%; display: flex; align-items: center; justify-content: center;
      font-family: var(--font-h); font-size: 1.1rem; font-weight: 700; flex-shrink: 0;
      border: 2px solid rgba(255,255,255,.3);
    }
    .fiche-hero-info h1 { font-size: 1.2rem; color: #fff; margin-bottom: .1rem; }
    .fiche-hero-info p  { color: rgba(255,255,255,.6); font-size: .82rem; }
    .hero-stat {
      margin-left: auto; background: rgba(255,255,255,.12);
      border: 1px solid rgba(255,255,255,.2); border-radius: 10px;
      padding: .6rem 1.1rem; text-align: center;
    }
    .hero-stat-num { font-family: var(--font-h); font-size: 1.4rem; color: #fff; font-weight: 700; line-height: 1; }
    .hero-stat-lbl { font-size: .68rem; color: rgba(255,255,255,.55); margin-top: 3px; }

    /* ── Légende niveaux ── */
    .legende-bar {
      display: flex; gap: .5rem; flex-wrap: wrap; align-items: center;
      padding: .55rem 1rem; background: #fff; border-radius: 8px;
      box-shadow: 0 1px 4px rgba(0,0,0,.05); margin-bottom: 1.2rem;
    }
    .legende-item { display: flex; align-items: center; gap: .32rem; font-size: .76rem; font-weight: 600; }
    .legende-dot  { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }

    /* ── Séparateur CA ── */
    .ca-sep {
      font-family: var(--font-h); color: var(--gray-3); font-size: .75rem;
      text-transform: uppercase; letter-spacing: .1em;
      margin: 1.3rem 0 .5rem .1rem;
    }

    /* ── Carte accordéon ── */
    .apsa-acc {
      background: #fff; border-radius: 12px;
      box-shadow: 0 2px 10px rgba(0,0,0,.06);
      margin-bottom: .9rem; overflow: hidden;
      border: 2px solid transparent; transition: border-color .25s, box-shadow .25s;
    }
    .apsa-acc.open { border-color: var(--navy); box-shadow: 0 4px 24px rgba(30,45,100,.12); }

    .apsa-trigger {
      display: flex; align-items: center; gap: .9rem;
      padding: 1rem 1.3rem; cursor: pointer;
      transition: background .15s; user-select: none;
    }
    .apsa-trigger:hover { background: #f8fafc; }
    .apsa-acc.open .apsa-trigger { background: #eef2ff; }

    .apsa-nom { font-family: var(--font-h); font-size: .98rem; font-weight: 700; color: var(--navy); margin-bottom: .2rem; }
    .apsa-meta { display: flex; gap: .45rem; flex-wrap: wrap; align-items: center; }

    .ca-badge {
      display: inline-flex; align-items: center; gap: .25rem;
      font-family: var(--font-h); font-size: .68rem; font-weight: 700;
      padding: .2rem .55rem; border-radius: 20px; letter-spacing: .03em;
    }
    .ca-CA1 { background: #fff3cd; color: #856404; }
    .ca-CA2 { background: #d1f0d1; color: #166534; }
    .ca-CA3 { background: #f3e8ff; color: #6d28d9; }
    .ca-CA4 { background: #dbeafe; color: #1d4ed8; }

    .prog-pill {
      font-family: var(--font-h); font-size: .7rem; font-weight: 700;
      padding: .18rem .55rem; border-radius: 20px;
      background: #f1f5f9; color: #64748b; transition: all .3s;
    }
    .prog-pill.partial { background: #fef3c7; color: #92400e; }
    .prog-pill.done    { background: #dcfce7; color: #15803d; }

    .apsa-chevron {
      width: 26px; height: 26px; background: #f1f5f9; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: .8rem; color: var(--navy); flex-shrink: 0;
      transition: transform .3s, background .2s;
    }
    .apsa-acc.open .apsa-chevron { transform: rotate(180deg); background: var(--navy); color: #fff; }

    /* ── Contenu accordéon ── */
    .apsa-body { max-height: 0; overflow: hidden; transition: max-height .45s cubic-bezier(.4,0,.2,1); }
    .apsa-acc.open .apsa-body { max-height: 3000px; }
    .apsa-body-inner { padding: 0 0 1.1rem; }

    /* ── Section domaine ── */
    .dom-section { margin: .3rem 1.1rem .9rem; }
    .dom-header {
      display: flex; align-items: center; gap: .5rem;
      padding: .5rem .8rem; background: var(--navy); color: #fff;
      border-radius: 7px 7px 0 0; font-family: var(--font-h); font-size: .8rem;
    }
    .dom-pill { background: rgba(255,255,255,.2); color: #fff; font-weight: 700; padding: .12rem .45rem; border-radius: 8px; font-size: .72rem; }
    .dom-lbl  { font-size: .76rem; opacity: .82; }

    .scroll-hint { display: none; font-size: .68rem; color: #94a3b8; text-align: center; padding: .3rem .5rem; }
    @media(max-width:650px){ .scroll-hint{ display:block; } }

    /* ── Table évaluation ── */
    .eval-scroll { overflow-x: auto; border: 1px solid #e5e7eb; border-top: none; border-radius: 0 0 7px 7px; }
    .eval-table  { width: 100%; border-collapse: collapse; min-width: 520px; }

    .th-obj { background: #2c3e6b; color: #fff; font-family: var(--font-h); font-size: .77rem; font-weight: 700; text-transform: uppercase; letter-spacing: .05em; padding: .6rem .9rem; width: 26%; text-align: left; border-right: 1px solid rgba(255,255,255,.15); vertical-align: middle; }
    .th-niv { padding: 0; vertical-align: top; border-right: 1px solid #e5e7eb; }
    .th-niv:last-child { border-right: none; }
    .th-niv-top   { padding: .5rem .4rem .28rem; font-family: var(--font-h); font-size: .72rem; font-weight: 700; text-transform: uppercase; letter-spacing: .03em; text-align: center; }
    .th-niv-scale { display: flex; align-items: center; justify-content: space-between; padding: .12rem .5rem .4rem; font-size: .62rem; font-weight: 700; border-top: 1px solid rgba(0,0,0,.06); }
    .th-NA  { background: #fee2e2; color: #b91c1c; }
    .th-ECA { background: #fef3c7; color: #92400e; }
    .th-A   { background: #dcfce7; color: #15803d; }
    .th-D   { background: #ede9fe; color: #6d28d9; }

    .eval-table tbody tr { border-bottom: 1px solid #e5e7eb; }
    .eval-table tbody tr:last-child { border-bottom: none; }

    .td-obj {
      padding: .75rem .9rem; vertical-align: middle;
      font-size: .8rem; font-weight: 600; color: #1e293b;
      border-right: 1px solid #e5e7eb; background: #f8fafc;
      line-height: 1.45; border-left: 4px solid transparent; transition: border-left-color .2s;
    }
    .obj-num {
      display: inline-flex; align-items: center; justify-content: center;
      width: 18px; height: 18px; background: var(--navy); color: #fff;
      border-radius: 50%; font-size: .6rem; font-weight: 700;
      margin-right: .3rem; vertical-align: middle; flex-shrink: 0;
    }
    .obj-badge { display: inline-block; font-size: .6rem; font-weight: 700; padding: .08rem .35rem; border-radius: 7px; margin-left: .3rem; vertical-align: middle; }
    .obj-badge-NA  { background: #fee2e2; color: #b91c1c; }
    .obj-badge-ECA { background: #fef3c7; color: #92400e; }
    .obj-badge-A   { background: #dcfce7; color: #15803d; }
    .obj-badge-D   { background: #ede9fe; color: #6d28d9; }
    .obj-badge-vide { background: #f1f5f9; color: #94a3b8; }

    .td-niv {
      padding: .6rem .5rem; vertical-align: top; text-align: center;
      font-size: .72rem; line-height: 1.5; color: #374151;
      cursor: pointer; transition: all .12s; border-right: 1px solid #e5e7eb; position: relative;
    }
    .td-niv:last-child { border-right: none; }
    .td-niv:hover { filter: brightness(.93); }
    .td-NA  { background: #fef9f9; }
    .td-ECA { background: #fffdf0; }
    .td-A   { background: #f7fef9; }
    .td-D   { background: #faf7ff; }
    .td-desc-empty { color: #c5cdd8; font-style: italic; }

    .td-niv.selected { font-weight: 700; }
    .td-NA.selected  { background: #fecaca; color: #7f1d1d; outline: 3px solid #ef4444; outline-offset: -3px; }
    .td-ECA.selected { background: #fde68a; color: #78350f; outline: 3px solid #f59e0b; outline-offset: -3px; }
    .td-A.selected   { background: #bbf7d0; color: #14532d; outline: 3px solid #22c55e; outline-offset: -3px; }
    .td-D.selected   { background: #ddd6fe; color: #3b0764; outline: 3px solid #8b5cf6; outline-offset: -3px; }
    .td-niv.selected::before { content:''; display:block; height:4px; margin:-.6rem -.5rem .4rem; }
    .td-NA.selected::before  { background:#ef4444; }
    .td-ECA.selected::before { background:#f59e0b; }
    .td-A.selected::before   { background:#22c55e; }
    .td-D.selected::before   { background:#8b5cf6; }
    .td-check { display:none; width:24px;height:24px;border-radius:50%;align-items:center;justify-content:center;font-size:.9rem;font-weight:900;margin:0 auto .35rem;color:#fff; }
    .td-NA.selected  .td-check { display:flex;background:#ef4444; }
    .td-ECA.selected .td-check { display:flex;background:#f59e0b; }
    .td-A.selected   .td-check { display:flex;background:#22c55e; }
    .td-D.selected   .td-check { display:flex;background:#8b5cf6; }

    tr.sel-NA  .td-obj { border-left-color:#ef4444; }
    tr.sel-ECA .td-obj { border-left-color:#f59e0b; }
    tr.sel-A   .td-obj { border-left-color:#22c55e; }
    tr.sel-D   .td-obj { border-left-color:#8b5cf6; }

    /* ── Commentaire + save ── */
    .comment-wrap { margin: .8rem 1.1rem 0; }
    .comment-wrap label { font-size: .77rem; font-weight: 700; color: var(--navy); display: block; margin-bottom: .3rem; }
    .comment-wrap textarea { width:100%;box-sizing:border-box;min-height:52px;font-size:.81rem;resize:vertical;border:1px solid #d1d5db;border-radius:7px;padding:.5rem .7rem;font-family:var(--font-b); }

    .save-row { margin: .75rem 1.1rem 0; display:flex;align-items:center;justify-content:flex-end;gap:.75rem; }
    .save-status-mini { font-size:.77rem;color:#94a3b8; }
    .save-status-mini.modified { color:#f59e0b;font-weight:600; }
    .save-status-mini.saved    { color:#22c55e;font-weight:600; }
  </style>
</head>
<body>
<nav class="topbar">
  <a href="classe.html" class="topbar-logo">← Retour</a>
  <span class="topbar-title" id="topbar-title">Mes APSA</span>
</nav>

<div class="container-sm" id="main-content">
  <div class="loader-wrap" style="min-height:60vh">
    <div class="spinner"></div><span>Chargement de tes activités...</span>
  </div>
</div>

<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
<script src="../firebase-config.js"></script>
<script>
  // ── Lecture des params URL ────────────────────────────────
  const params   = new URLSearchParams(window.location.search);
  const eleveId  = params.get('eleveId');
  const classeId = params.get('classeId');
  const niveau   = params.get('niveau');

  // Garde-fou : si les params manquent → retour
  if (!eleveId || !classeId || !niveau) window.location.href = 'classe.html';

  // Codes de niveau selon le cycle
  const CODES = niveau === '6e' ? ['NA','ECA','A'] : ['NA','ECA','A','D'];
  const NIV = {
    NA:  { label:'Non Atteint',           scale:'0 — 2',  icon:'✕', col:'#ef4444' },
    ECA: { label:'Partiellement Atteint', scale:'3 — 5',  icon:'⊙', col:'#f59e0b' },
    A:   { label:'Atteint',               scale:'6 — 8',  icon:'✓', col:'#22c55e' },
    D:   { label:'Dépassé',               scale:'9 — 10', icon:'★', col:'#8b5cf6' }
  };
  const CA_ICON  = { CA1:'⏱️', CA2:'🌿', CA3:'🎭', CA4:'⚔️' };
  const CA_COLOR = { CA1:'ca-CA1', CA2:'ca-CA2', CA3:'ca-CA3', CA4:'ca-CA4' };

  // Stockage mémoire des évaluations par cycle
  // evals[cycleId] = { apsaId, resultats:{}, modifie:false }
  const evals = {};

  // ── Init ─────────────────────────────────────────────────
  async function init() {
    try {
      // 1. Charger l'élève
      const eleveData = await dbGet('eleves/' + eleveId);
      if (!eleveData) throw new Error('Élève introuvable');
      const eleve = { id: eleveId, ...eleveData };

      // 2. Charger les cycles actifs pour cette classe
      const cycles = await getCyclesActifs(classeId);
      if (!cycles.length) {
        document.getElementById('main-content').innerHTML =
          '<div class="alert alert-info">ℹ️ Aucune activité programmée pour ta classe. Reviens plus tard !</div>';
        return;
      }

      // 3. Charger les APSA
      const apsaMap = {};
      for (const cy of cycles) {
        if (cy.apsaId && !apsaMap[cy.apsaId]) {
          const a = await getApsa(cy.apsaId);
          if (a) apsaMap[cy.apsaId] = a;
        }
      }

      // 4. Charger les évaluations existantes
      for (const cy of cycles) {
        const ev = await getEvaluation(eleveId, cy.id);
        evals[cy.id] = {
          apsaId:   cy.apsaId,
          resultats: ev ? (ev.resultats || {}) : {},
          modifie:  false
        };
      }

      // 5. Titre
      const initiales = (eleve.prenom?.[0]||'') + (eleve.nom?.[0]||'');
      document.title = `${eleve.prenom} — EPS`;
      document.getElementById('topbar-title').textContent = `${eleve.prenom} ${(eleve.nom||'').toUpperCase()}`;

      // 6. Construire le HTML
      const initiales2 = initiales.toUpperCase();
      let html = `
        <div class="fiche-hero">
          <div class="fiche-avatar">${initiales2}</div>
          <div class="fiche-hero-info">
            <h1>${eleve.prenom} ${(eleve.nom||'').toUpperCase()}</h1>
            <p>${eleve.classe||''} · ${niveau} · ${window.ANNEE_SCOLAIRE}</p>
          </div>
          <div class="hero-stat">
            <div class="hero-stat-num">${cycles.length}</div>
            <div class="hero-stat-lbl">APSA cette année</div>
          </div>
        </div>
        <div class="legende-bar">
          <span style="font-size:.76rem;font-weight:700;color:#64748b;margin-right:.15rem;">Niveaux :</span>
          ${CODES.map(c => `<div class="legende-item"><div class="legende-dot" style="background:${NIV[c].col}"></div><span style="color:${NIV[c].col}">${NIV[c].label}</span></div>`).join('<span style="color:#d1d5db;margin:0 .08rem">·</span>')}
        </div>`;

      // Grouper par CA
      const parCA = {};
      cycles.forEach(cy => {
        const ap = apsaMap[cy.apsaId];
        if (!ap) return;
        const ca = ap.champAppr || 'Autre';
        if (!parCA[ca]) parCA[ca] = [];
        parCA[ca].push({ cy, ap });
      });

      ['CA1','CA2','CA3','CA4','Autre'].forEach(ca => {
        if (!parCA[ca]) return;
        const caLbl = window.CHAMPS_APPRENTISSAGE[ca] || ca;
        html += `<div class="ca-sep">${CA_ICON[ca]||''} ${ca} — ${caLbl}</div>`;
        parCA[ca].forEach(({ cy, ap }) => { html += buildAccordion(cy, ap); });
      });

      document.getElementById('main-content').innerHTML = html;

      // Restaurer visuellement les évals existantes
      cycles.forEach(cy => {
        const ev = evals[cy.id];
        if (!ev) return;
        Object.entries(ev.resultats).forEach(([key, code]) => {
          if (key.startsWith('obj_')) actualiserLigne(cy.id, key.replace('obj_',''), code);
        });
      });

    } catch(e) {
      document.getElementById('main-content').innerHTML =
        `<div class="alert alert-error">❌ ${e.message}<br><br><a href="classe.html" class="btn btn-ghost">← Retour</a></div>`;
    }
  }

  // ── Construire un accordéon ───────────────────────────────
  function buildAccordion(cy, ap) {
    const cyId = cy.id;
    const ev   = evals[cyId] || { resultats:{} };
    const objs = ap.objectifs || [];

    // Comptage progression
    const nbEval = objs.filter(o => ev.resultats[`obj_${o.id||1}`]).length;
    const pillCls = nbEval === 0 ? '' : nbEval < objs.length ? 'partial' : 'done';
    const pillTxt = objs.length === 0 ? '—' : `${nbEval}/${objs.length}`;

    // Période
    const d1 = cy.dateDebut ? new Date(cy.dateDebut).toLocaleDateString('fr-FR',{day:'2-digit',month:'short'}) : '';
    const d2 = cy.dateFin   ? new Date(cy.dateFin).toLocaleDateString('fr-FR',{day:'2-digit',month:'short',year:'numeric'}) : '';
    const periode = d1 ? `📅 ${d1}${d2?' → '+d2:''}` : '';

    // Tables par domaine
    const parDom = {};
    objs.forEach(obj => { const d=obj.domaine||'Général'; if(!parDom[d]) parDom[d]=[]; parDom[d].push(obj); });

    const tablesHtml = Object.keys(parDom).length === 0
      ? '<div class="alert alert-info" style="margin:.8rem 1.1rem;">ℹ️ Objectifs non encore définis.</div>'
      : Object.entries(parDom).map(([dom, domObjs]) => {
          const domLbl = window.DOMAINES_SOCLE[dom] || dom;
          const rows = domObjs.map((obj, i) => {
            const num  = obj.id || (i + 1);
            const code = ev.resultats[`obj_${num}`] || '';
            const desc = obj.descripteurs || {};
            return `
              <tr id="row-${cyId}-${num}" class="${code?'sel-'+code:''}">
                <td class="td-obj">
                  <span class="obj-num">${num}</span>${obj.texte||''}
                  <span class="obj-badge ${code?'obj-badge-'+code:'obj-badge-vide'}" id="badge-${cyId}-${num}">${code||'—'}</span>
                </td>
                ${CODES.map(c => `
                  <td class="td-niv td-${c}${code===c?' selected':''}" id="td-${cyId}-${num}-${c}"
                      onclick="setNiveau('${cyId}','${num}','${c}')">
                    <div class="td-check">✓</div>
                    <div class="${desc[c]?'':'td-desc-empty'}">${desc[c]||'—'}</div>
                  </td>`).join('')}
              </tr>`;
          }).join('');

          return `
            <div class="dom-section">
              <div class="dom-header">
                <span class="dom-pill">${dom}</span>
                <span class="dom-lbl">${domLbl}</span>
              </div>
              <div class="scroll-hint">← Faire défiler →</div>
              <div class="eval-scroll">
                <table class="eval-table">
                  <thead><tr>
                    <th class="th-obj">Objectif</th>
                    ${CODES.map(c => `
                      <th class="th-niv">
                        <div class="th-niv-top th-${c}">${NIV[c].icon} ${c==='NA'?'Non Atteint':c==='ECA'?'Part. Atteint':c==='A'?'Atteint':'Dépassé'}</div>
                        <div class="th-niv-scale">
                          <span>${NIV[c].scale.split('—')[0].trim()}</span>
                          <span style="opacity:.3">—</span>
                          <span>${NIV[c].scale.split('—')[1].trim()}</span>
                        </div>
                      </th>`).join('')}
                  </tr></thead>
                  <tbody>${rows}</tbody>
                </table>
              </div>
            </div>`;
        }).join('');

    return `
      <div class="apsa-acc" id="acc-${cyId}">
        <div class="apsa-trigger" onclick="toggleAcc('${cyId}')">
          <div style="flex:1;min-width:0;">
            <div class="apsa-nom">${ap.nom||'APSA'}</div>
            <div class="apsa-meta">
              ${ap.champAppr ? `<span class="ca-badge ${CA_COLOR[ap.champAppr]||''}">${CA_ICON[ap.champAppr]||''} ${ap.champAppr}</span>` : ''}
              ${periode ? `<span style="font-size:.73rem;color:#94a3b8;">${periode}</span>` : ''}
            </div>
          </div>
          <span class="prog-pill ${pillCls}" id="pill-${cyId}">✏️ ${pillTxt} évalué${nbEval>1?'s':''}</span>
          <div class="apsa-chevron">▼</div>
        </div>
        <div class="apsa-body" id="body-${cyId}">
          <div class="apsa-body-inner">
            ${tablesHtml}
            <div class="comment-wrap">
              <label>💬 Commentaire (optionnel)</label>
              <textarea id="comment-${cyId}" placeholder="Mes ressentis, mes progrès..." oninput="marquerModifie('${cyId}')">${ev.resultats['commentaire']||''}</textarea>
            </div>
            <div class="save-row">
              <span class="save-status-mini" id="status-${cyId}">Clique sur une case pour t'évaluer</span>
              <button class="btn btn-success" onclick="sauvegarder('${cyId}')">💾 Enregistrer</button>
            </div>
          </div>
        </div>
      </div>`;
  }

  // ── Accordéon toggle ─────────────────────────────────────
  function toggleAcc(cyId) {
    document.getElementById('acc-'+cyId)?.classList.toggle('open');
  }

  // ── Sélection niveau ─────────────────────────────────────
  function setNiveau(cyId, num, code) {
    const ev = evals[cyId]; if (!ev) return;
    const key = 'obj_' + num;
    if (ev.resultats[key] === code) { delete ev.resultats[key]; actualiserLigne(cyId, num, ''); }
    else { ev.resultats[key] = code; actualiserLigne(cyId, num, code); }
    marquerModifie(cyId);
    majPill(cyId);
  }

  function actualiserLigne(cyId, num, code) {
    ['NA','ECA','A','D'].forEach(c => {
      const td = document.getElementById(`td-${cyId}-${num}-${c}`);
      if (td) td.className = `td-niv td-${c}${code===c?' selected':''}`;
    });
    const badge = document.getElementById(`badge-${cyId}-${num}`);
    if (badge) { badge.className=`obj-badge ${code?'obj-badge-'+code:'obj-badge-vide'}`; badge.textContent=code||'—'; }
    const row = document.getElementById(`row-${cyId}-${num}`);
    if (row) row.className = code?'sel-'+code:'';
  }

  function majPill(cyId) {
    const ev   = evals[cyId]; if (!ev) return;
    const pill = document.getElementById('pill-'+cyId); if (!pill) return;
    const n = Object.keys(ev.resultats).filter(k=>k.startsWith('obj_')&&ev.resultats[k]).length;
    pill.textContent = n===0 ? '✏️ — évalué' : `✅ ${n} évalué${n>1?'s':''}`;
    pill.className   = 'prog-pill ' + (n===0?'':ev.modifie||n>0?'partial':'');
  }

  function marquerModifie(cyId) {
    if (evals[cyId]) evals[cyId].modifie = true;
    const st = document.getElementById('status-'+cyId);
    if (st) { st.textContent='● Non enregistré'; st.className='save-status-mini modified'; }
  }

  async function sauvegarder(cyId) {
    const ev  = evals[cyId]; if (!ev) return;
    const btn = document.querySelector(`#acc-${cyId} .btn-success`);
    const st  = document.getElementById('status-'+cyId);
    if (btn) { btn.disabled=true; btn.textContent='⏳...'; }
    const resultats = { ...ev.resultats };
    const ta = document.getElementById('comment-'+cyId);
    if (ta?.value.trim()) resultats['commentaire']=ta.value.trim(); else delete resultats['commentaire'];
    try {
      await sauvegarderEvaluation(eleveId, cyId, ev.apsaId, resultats);
      ev.resultats = resultats; ev.modifie = false;
      if (st) { st.textContent='✓ Enregistré à '+new Date().toLocaleTimeString('fr-FR'); st.className='save-status-mini saved'; }
      // Mettre à jour la pill en vert
      const pill = document.getElementById('pill-'+cyId);
      if (pill) {
        const n = Object.keys(resultats).filter(k=>k.startsWith('obj_')&&resultats[k]).length;
        if (n > 0) { pill.textContent=`✅ ${n} évalué${n>1?'s':''}`; pill.className='prog-pill done'; }
      }
      showToast('✓ Évaluation enregistrée !');
    } catch(e) {
      if (st) { st.textContent='❌ '+e.message; st.className='save-status-mini'; }
    } finally {
      if (btn) { btn.disabled=false; btn.textContent='💾 Enregistrer'; }
    }
  }

  function showToast(msg) {
    const t=document.createElement('div'); t.className='toast success'; t.textContent=msg;
    document.body.appendChild(t); setTimeout(()=>t.remove(),3000);
  }
  window.addEventListener('beforeunload', e=>{
    if (Object.values(evals).some(ev=>ev.modifie)) { e.preventDefault(); e.returnValue=''; }
  });

  init();
</script>
</body>
</html>
