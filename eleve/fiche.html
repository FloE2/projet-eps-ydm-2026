<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ma fiche auto-évaluation — EPS</title>
  <link rel="stylesheet" href="../assets/style.css">
  <style>
    body { padding-bottom: 90px; background: #f4f6fa; }
    .fiche-header {
      background: linear-gradient(135deg, var(--navy) 0%, #1e4d8c 100%);
      color:#fff; border-radius:var(--radius); padding:1.4rem 2rem;
      margin-bottom:1.5rem; display:flex; align-items:center; gap:1.5rem; flex-wrap:wrap;
    }
    .fiche-avatar { width:60px;height:60px;background:rgba(255,255,255,.15);border-radius:50%;display:flex;align-items:center;justify-content:center;font-family:var(--font-h);font-size:1.3rem;font-weight:700;flex-shrink:0; }
    .fiche-info h1 { font-size:1.4rem;color:#fff;margin-bottom:.15rem; }
    .fiche-info p  { color:rgba(255,255,255,.65);font-size:.85rem; }
    .fiche-apsa-badge { margin-left:auto;background:var(--orange);color:#fff;padding:.5rem 1.2rem;border-radius:20px;text-align:center;font-family:var(--font-h);font-size:.95rem;font-weight:700; }
    .fiche-apsa-badge small { display:block;font-family:var(--font-b);font-size:.7rem;opacity:.8;font-weight:400;margin-top:2px; }
    .apsa-section { background:#fff;border-radius:10px;box-shadow:0 2px 12px rgba(0,0,0,.07);margin-bottom:2rem;overflow:hidden; }
    .apsa-section-header { background:var(--navy);color:#fff;padding:.9rem 1.4rem;display:flex;align-items:center;gap:1rem; }
    .domaine-pill { background:rgba(255,255,255,.2);color:#fff;font-family:var(--font-h);font-size:.82rem;font-weight:700;padding:.25rem .8rem;border-radius:20px; }
    .domaine-label { font-size:.9rem;opacity:.82; }
    .eval-table-wrap { overflow-x:auto; }
    .eval-table { width:100%;border-collapse:collapse;min-width:600px; }
    .th-objectif { background:#2c3e6b;color:#fff;font-family:var(--font-h);font-size:.8rem;font-weight:700;text-transform:uppercase;letter-spacing:.06em;padding:.7rem 1rem;width:26%;text-align:left;border-right:1px solid rgba(255,255,255,.15); }
    .th-niveau { padding:0;vertical-align:top;border-right:1px solid #e5e7eb; }
    .th-niveau:last-child { border-right:none; }
    .th-niveau-inner { padding:.6rem .5rem .35rem;font-family:var(--font-h);font-size:.75rem;font-weight:700;text-transform:uppercase;letter-spacing:.04em;text-align:center; }
    .th-NA  { background:#fee2e2;color:#b91c1c; }
    .th-ECA { background:#fef3c7;color:#92400e; }
    .th-A   { background:#dcfce7;color:#15803d; }
    .th-D   { background:#ede9fe;color:#6d28d9; }
    .th-scale { display:flex;align-items:center;justify-content:space-between;padding:.2rem .6rem .5rem;font-size:.65rem;font-weight:700;border-top:1px solid rgba(0,0,0,.06); }
    .scale-NA  { background:#fee2e2;color:#ef4444; }
    .scale-ECA { background:#fef3c7;color:#d97706; }
    .scale-A   { background:#dcfce7;color:#22c55e; }
    .scale-D   { background:#ede9fe;color:#8b5cf6; }
    .eval-table tbody tr { border-bottom:1px solid #e5e7eb; }
    .eval-table tbody tr:last-child { border-bottom:none; }
    .td-objectif { padding:.85rem 1rem;vertical-align:middle;font-size:.82rem;font-weight:600;color:#1e293b;border-right:1px solid #e5e7eb;background:#f8fafc;line-height:1.45;border-left:4px solid transparent;transition:border-left-color .2s; }
    .td-obj-num { display:inline-flex;align-items:center;justify-content:center;width:20px;height:20px;background:var(--navy);color:#fff;border-radius:50%;font-size:.65rem;font-weight:700;margin-right:.4rem;vertical-align:middle;flex-shrink:0; }
    .td-niveau { padding:.7rem .65rem;vertical-align:top;text-align:center;font-size:.74rem;line-height:1.5;color:#374151;cursor:pointer;transition:all .12s;border-right:1px solid #e5e7eb;position:relative; }
    .td-niveau:last-child { border-right:none; }
    .td-niveau:hover { filter:brightness(.93); }
    .td-NA  { background:#fef9f9; }
    .td-ECA { background:#fffdf0; }
    .td-A   { background:#f7fef9; }
    .td-D   { background:#faf7ff; }
    .td-niveau.selected { font-weight:700; }
    .td-NA.selected  { background:#fee2e2;color:#991b1b; }
    .td-ECA.selected { background:#fef3c7;color:#78350f; }
    .td-A.selected   { background:#dcfce7;color:#14532d; }
    .td-D.selected   { background:#ede9fe;color:#4c1d95; }
    .td-check { position:absolute;top:.3rem;right:.4rem;font-size:.7rem;font-weight:900;display:none; }
    .td-NA.selected  .td-check { display:block;color:#ef4444; }
    .td-ECA.selected .td-check { display:block;color:#f59e0b; }
    .td-A.selected   .td-check { display:block;color:#22c55e; }
    .td-D.selected   .td-check { display:block;color:#8b5cf6; }
    .sel-NA  .td-objectif { border-left-color:#ef4444; }
    .sel-ECA .td-objectif { border-left-color:#f59e0b; }
    .sel-A   .td-objectif { border-left-color:#22c55e; }
    .sel-D   .td-objectif { border-left-color:#8b5cf6; }
    .obj-badge { display:inline-block;font-size:.63rem;font-weight:700;padding:.1rem .4rem;border-radius:8px;margin-left:.4rem;vertical-align:middle; }
    .obj-badge-NA  { background:#fee2e2;color:#b91c1c; }
    .obj-badge-ECA { background:#fef3c7;color:#92400e; }
    .obj-badge-A   { background:#dcfce7;color:#15803d; }
    .obj-badge-D   { background:#ede9fe;color:#6d28d9; }
    .obj-badge-vide { background:#f1f5f9;color:#94a3b8; }
    .td-desc-empty { color:#c5cdd8;font-style:italic; }
    .commentaire-section { padding:.9rem 1.2rem;border-top:2px solid #f1f5f9; }
    .commentaire-section label { font-size:.79rem;font-weight:700;color:var(--navy);display:block;margin-bottom:.4rem; }
    .commentaire-section textarea { width:100%;box-sizing:border-box;min-height:60px;font-size:.83rem;resize:vertical;border:1px solid #d1d5db;border-radius:6px;padding:.55rem .75rem; }
    .legende-bar { display:flex;gap:.5rem;flex-wrap:wrap;align-items:center;margin-bottom:1.2rem;padding:.6rem 1rem;background:#fff;border-radius:8px;box-shadow:0 1px 4px rgba(0,0,0,.05); }
    .legende-item { display:flex;align-items:center;gap:.35rem;font-size:.77rem;font-weight:600; }
    .legende-dot { width:11px;height:11px;border-radius:50%; }
    .scroll-hint { display:none;font-size:.7rem;color:#94a3b8;text-align:center;padding:.35rem;background:#f8fafc; }
    @media(max-width:700px){ .scroll-hint{display:block;} }
    .save-bar { position:fixed;bottom:0;left:0;right:0;background:#fff;border-top:2px solid #e5e7eb;padding:.9rem 1.5rem;display:flex;align-items:center;justify-content:space-between;gap:1rem;z-index:50;box-shadow:0 -4px 20px rgba(0,0,0,.08); }
    .save-status { font-size:.85rem;color:#94a3b8; }
    .save-status.modified { color:#f59e0b;font-weight:600; }
    .save-status.saved { color:#22c55e;font-weight:600; }
  </style>
</head>
<body>
<nav class="topbar">
  <a href="classe.html" class="topbar-logo">← Retour</a>
  <span class="topbar-title" id="topbar-title">Ma fiche EPS</span>
</nav>
<div class="container-sm" id="main-content">
  <div class="loader-wrap" style="min-height:60vh"><div class="spinner"></div><span>Chargement de ta fiche...</span></div>
</div>
<div class="save-bar">
  <span class="save-status" id="save-status">Clique sur une case pour t'évaluer</span>
  <button class="btn btn-success btn-lg" id="btn-save" onclick="sauvegarder()">💾 Enregistrer</button>
</div>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
<script src="../firebase-config.js"></script>
<script>
  const params  = new URLSearchParams(window.location.search);
  const eleveId = params.get('eleveId');
  const cycleId = params.get('cycleId');
  const apsaId  = params.get('apsaId');
  const niveau  = params.get('niveau');
  if (!eleveId || !cycleId || !apsaId) window.location.href = 'classe.html';
  let evalActuelle = {}, eleve = null, apsa = null, modifie = false;
  const NIVEAUX = {
    NA:  { label:'Non Atteint',           scale:'0 — 2',  icon:'✕', couleur:'#ef4444' },
    ECA: { label:'Partiellement Atteint', scale:'3 — 5',  icon:'⊙', couleur:'#f59e0b' },
    A:   { label:'Atteint',               scale:'6 — 8',  icon:'✓', couleur:'#22c55e' },
    D:   { label:'Dépassé',               scale:'9 — 10', icon:'★', couleur:'#8b5cf6' }
  };
  async function init() {
    try {
      const [eleveData, apsaData, evalDoc] = await Promise.all([
        dbGet('eleves/' + eleveId), dbGet('apsa/' + apsaId), getEvaluation(eleveId, cycleId)
      ]);
      if (!eleveData) throw new Error("Élève introuvable");
      if (!apsaData)  throw new Error("APSA introuvable");
      eleve = { id:eleveId, ...eleveData };
      apsa  = { id:apsaId,  ...apsaData };
      if (evalDoc) evalActuelle = evalDoc.resultats || {};
      document.title = `${apsa.nom} — ${eleve.prenom} — EPS`;
      document.getElementById('topbar-title').textContent = apsa.nom;
      renderFiche();
    } catch(e) {
      document.getElementById('main-content').innerHTML =
        `<div class="alert alert-error">❌ ${e.message}<br><br><a href="classe.html" class="btn btn-ghost">← Retour</a></div>`;
    }
  }
  function renderFiche() {
    const niveauKeys = niveau === '6e' ? ['NA','ECA','A'] : ['NA','ECA','A','D'];
    const initiales  = (eleve.prenom?.[0]||'') + (eleve.nom?.[0]||'');
    const parDomaine = {};
    (apsa.objectifs || []).forEach(obj => {
      const d = obj.domaine || 'Général';
      if (!parDomaine[d]) parDomaine[d] = [];
      parDomaine[d].push(obj);
    });
    let html = `
      <div class="fiche-header">
        <div class="fiche-avatar">${initiales.toUpperCase()}</div>
        <div class="fiche-info">
          <h1>${eleve.prenom} ${(eleve.nom||'').toUpperCase()}</h1>
          <p>${eleve.classe||''} · ${niveau} · ${window.ANNEE_SCOLAIRE}</p>
        </div>
        <div class="fiche-apsa-badge">${apsa.nom}<small>${apsa.champAppr||''}</small></div>
      </div>
      <div class="legende-bar">
        <span style="font-size:.77rem;font-weight:700;color:#64748b;margin-right:.2rem;">Niveaux :</span>
        ${niveauKeys.map(code => `<div class="legende-item"><div class="legende-dot" style="background:${NIVEAUX[code].couleur}"></div><span style="color:${NIVEAUX[code].couleur}">${code==='D'?'Dépassé':NIVEAUX[code].label}</span></div>`).join('<span style="color:#d1d5db;margin:0 .1rem">·</span>')}
      </div>`;
    if (Object.keys(parDomaine).length === 0) {
      html += `<div class="alert alert-info">ℹ️ Aucun objectif configuré pour cette APSA. Contactez votre professeur.</div>`;
    } else {
      Object.entries(parDomaine).forEach(([domaine, objectifs]) => {
        const domLabel = window.DOMAINES_SOCLE[domaine] || domaine;
        html += `
          <div class="apsa-section">
            <div class="apsa-section-header">
              <span class="domaine-pill">${domaine}</span>
              <span class="domaine-label">${domLabel}</span>
            </div>
            <div class="scroll-hint">← Faire défiler →</div>
            <div class="eval-table-wrap">
              <table class="eval-table">
                <thead><tr>
                  <th class="th-objectif">Objectif</th>
                  ${niveauKeys.map(code => `
                    <th class="th-niveau">
                      <div class="th-niveau-inner th-${code}">${NIVEAUX[code].icon} ${code==='NA'?'Non Atteint':code==='ECA'?'Partiellement Atteint':code==='A'?'Atteint':'Dépassé'}</div>
                      <div class="th-scale scale-${code}"><span>${NIVEAUX[code].scale.split('—')[0].trim()}</span><span style="opacity:.35">—</span><span>${NIVEAUX[code].scale.split('—')[1].trim()}</span></div>
                    </th>`).join('')}
                </tr></thead>
                <tbody>
                  ${objectifs.map((obj,i) => {
                    const num = obj.id || (i+1);
                    const code = evalActuelle[`obj_${num}`] || '';
                    const d = obj.descripteurs || {};
                    return `
                      <tr id="row-${num}" class="${code?'sel-'+code:''}">
                        <td class="td-objectif">
                          <span class="td-obj-num">${num}</span>${obj.texte}
                          <span class="obj-badge ${code?'obj-badge-'+code:'obj-badge-vide'}" id="badge-${num}">${code||'—'}</span>
                        </td>
                        ${niveauKeys.map(c => `
                          <td class="td-niveau td-${c}${code===c?' selected':''}" id="td-${num}-${c}" onclick="setNiveau('${num}','${c}')">
                            <span class="td-check">✓</span>
                            <div class="${d[c]?'':'td-desc-empty'}">${d[c]||'—'}</div>
                          </td>`).join('')}
                      </tr>`;
                  }).join('')}
                </tbody>
              </table>
            </div>
            <div class="commentaire-section">
              <label>💬 Commentaire (optionnel)</label>
              <textarea id="commentaire-${domaine.replace(/\./g,'_')}" placeholder="Mes ressentis, mes progrès..." oninput="marquerModifie()">${evalActuelle['commentaire_'+domaine]||''}</textarea>
            </div>
          </div>`;
      });
    }
    document.getElementById('main-content').innerHTML = html;
  }
  function setNiveau(num, code) {
    const key = `obj_${num}`;
    const ancien = evalActuelle[key] || '';
    if (ancien === code) { delete evalActuelle[key]; actualiserLigne(num,''); }
    else { evalActuelle[key] = code; actualiserLigne(num, code); }
    marquerModifie();
  }
  function actualiserLigne(num, code) {
    ['NA','ECA','A','D'].forEach(c => {
      const td = document.getElementById(`td-${num}-${c}`);
      if (!td) return;
      td.className = `td-niveau td-${c}${code===c?' selected':''}`;
    });
    const badge = document.getElementById(`badge-${num}`);
    if (badge) { badge.className=`obj-badge ${code?'obj-badge-'+code:'obj-badge-vide'}`; badge.textContent=code||'—'; }
    const row = document.getElementById(`row-${num}`);
    if (row) row.className = code?'sel-'+code:'';
  }
  function marquerModifie() {
    modifie = true;
    const el = document.getElementById('save-status');
    el.textContent = '● Modifications non enregistrées';
    el.className = 'save-status modified';
  }
  async function sauvegarder() {
    const btn = document.getElementById('btn-save');
    const status = document.getElementById('save-status');
    btn.disabled=true; btn.textContent='⏳ Enregistrement...';
    const resultats = { ...evalActuelle };
    document.querySelectorAll('[id^="commentaire-"]').forEach(ta => {
      const dom = ta.id.replace('commentaire-','').replace(/_/g,'.');
      if (ta.value.trim()) resultats['commentaire_'+dom] = ta.value.trim();
    });
    try {
      await sauvegarderEvaluation(eleveId, cycleId, apsaId, resultats);
      modifie=false;
      status.textContent='✓ Enregistré à '+new Date().toLocaleTimeString('fr-FR');
      status.className='save-status saved';
      showToast('✓ Évaluation enregistrée !','success');
    } catch(e) { status.textContent='❌ '+e.message; status.className='save-status'; }
    finally { btn.disabled=false; btn.textContent='💾 Enregistrer'; }
  }
  window.addEventListener('beforeunload', e=>{ if(modifie){e.preventDefault();e.returnValue='';} });
  function showToast(msg,type='success'){const t=document.createElement('div');t.className=`toast ${type}`;t.textContent=msg;document.body.appendChild(t);setTimeout(()=>t.remove(),3000);}
  init();
</script>
</body>
</html>
